version: '3'
services:
  restic:
    image: restic/rest-server:0.14.0@sha256:d2aff06f47eb38637dff580c3e6bce4af98f386c396a25d32eb6727ec96214a5
    container_name: restic
    restart: unless-stopped
    network_mode: host
    user: "568:568"
    entrypoint: rest-server
    command: --listen :8000 --path /data --append-only --private-repos
    volumes:
      - /volume3/docker/restic/data:/data
