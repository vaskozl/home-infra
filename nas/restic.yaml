version: '3'
services:
  restic:
    image: ghcr.io/vaskozl/rest-server:0.14.0@sha256:9aea775b92639caa5463995540569620374ad0b8de7e5cd21c0dae06497d3b7f
    container_name: restic
    restart: unless-stopped
    network_mode: host
    user: "568:568"
    entrypoint: rest-server
    command: --listen :8000 --path /data --private-repos
    volumes:
      - /volume3/docker/restic/data:/data
