version: '3'
services:
  restic:
    image: ghcr.io/vaskozl/rest-server:0.14.0@sha256:4114a9f7fef51d81928f3ff9717188ffda4e22fbefb90492fdb7eecc5d518c7e
    container_name: restic
    restart: unless-stopped
    network_mode: host
    user: "568:568"
    entrypoint: rest-server
    command: --listen :8000 --path /data --private-repos
    volumes:
      - /volume3/docker/restic/data:/data
