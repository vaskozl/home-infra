version: '3'
services:
  restic:
    image: ghcr.io/vaskozl/rest-server:0.14.0@sha256:fba9962a99581ab8a6e0aa5e46aa50e7c63447e175410030bb334f7e7876a83e
    container_name: restic
    restart: unless-stopped
    network_mode: host
    user: "568:568"
    entrypoint: rest-server
    command: --listen :8000 --path /data --private-repos
    volumes:
      - /volume3/docker/restic/data:/data
