version: '3'
services:
  node-exporter:
    image: ghcr.io/vaskozl/prometheus-node-exporter:1.11.1@sha256:e444f09312d205e6af6070e4264d3c79443475635dc2d1c4eca4fd4b2aab8923
    container_name: node-exporter
    network_mode: host
    volumes:
      - /:/host:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro
      - /run/udev/data:/host/root/run/udev/data:ro
    command:
      - --web.listen-address=0.0.0.0:9100
      - --path.rootfs=/host/root
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.udev.data=/host/root/run/udev/data
    restart: unless-stopped
