version: '3'
services:
  qbittorrent:
    image: ghcr.io/vaskozl/qbittorrent-nox:5.2.0@sha256:e71242239717f99173008afd6f3759f01dd6b629f75b3b35971745b855306c38
    container_name: qbittorrent
    restart: unless-stopped
    network_mode: host
    user: "0:0"
    environment:
      - HOME=/config
      - XDG_CONFIG_HOME=/config
      - XDG_DATA_HOME=/config
    volumes:
      - /volume3/docker/qbittorrent/config:/config
      - /volume1/torrents-v2/torrents:/torrents
    entrypoint: nice -n 10 ionice -c3 qbittorrent-nox --webui-port='55555'
    cpu_shares: 16
    mem_limit: 4G
  cross-seedd:
    image: ghcr.io/cross-seed/cross-seed:6.13.7@sha256:a1fed512261fd968c55cb03c51cff9c6620aa76a34b3b591afca95c890aa8225
    container_name: cross-seedd
    restart: unless-stopped
    network_mode: host
    user: "568:568"
    cpu_shares: 16
    mem_limit: 1G
    volumes:
      - /volume3/docker/qbittorrent/config/qBittorrent/BT_backup/:/torrents:ro
      - /volume3/docker/qbittorrent/config/cross-seeds:/cross-seeds
      - /volume3/docker/qbittorrent/config/cross-config:/config
    command: daemon
