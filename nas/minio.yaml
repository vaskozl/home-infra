version: '3'
services:
  s3:
    image: ghcr.io/vaskozl/minio:0.20260504@sha256:089fc3e218b17ced7071165b7809d4101cde6ba44aa75c7839e4a9abee2436aa
    command: server /data --console-address ":9001"
    restart: unless-stopped
    user: 1026:100
    env_file:
      - minio.enc.env
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - /volume3/docker/minio/data:/data
