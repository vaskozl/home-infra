version: '3'
services:
  s3:
    image: ghcr.io/vaskozl/minio:0.20260512@sha256:640beec6e0a5e7c673d2f7513623466ff4799e9f91f2a457c4896a3bb98bb161
    command: server /data --console-address ":9001"
    restart: unless-stopped
    user: 1026:100
    env_file:
      - minio.enc.env
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - /volume3/docker/minio/data:/data
