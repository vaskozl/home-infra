version: '3'
services:
  s3:
    image: ghcr.io/vaskozl/minio:0.20251015@sha256:433f912fa02c6877f7e3851963cb17443f2f2754d7ccde405f9f811b9277ae86
    command: server /data --console-address ":9001"
    restart: unless-stopped
    user: 1026:100
    env_file:
      - minio.enc.env
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - /volume3/docker/minio/data:/data
