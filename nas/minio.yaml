version: '3'
services:
  s3:
    image: ghcr.io/vaskozl/minio:0.20260512@sha256:d724530fce1ce9e3c79ee01b96863dce0e3c2b7f5d2d3768142e15f2253ba857
    command: server /data --console-address ":9001"
    restart: unless-stopped
    user: 1026:100
    env_file:
      - minio.enc.env
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - /volume3/docker/minio/data:/data
