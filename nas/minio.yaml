version: '3'
services:
  s3:
    image: ghcr.io/vaskozl/minio:0.20260604@sha256:abc385d6d56de75dcfbac52f9795a22c001f4b8fd910883e9f60cd69199197d0
    command: server /data --console-address ":9001"
    restart: unless-stopped
    user: 1026:100
    env_file:
      - minio.enc.env
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - /volume3/docker/minio/data:/data
