version: '3'
services:
  s3:
    image: ghcr.io/vaskozl/minio:0.20260520@sha256:bb3127c4e6059e3079b7fe2ba62025816c34d0dab8b8bbc4a020f2330e7d64a8
    command: server /data --console-address ":9001"
    restart: unless-stopped
    user: 1026:100
    env_file:
      - minio.enc.env
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - /volume3/docker/minio/data:/data
