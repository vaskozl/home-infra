version: '3'
services:
  s3:
    image: ghcr.io/vaskozl/minio:0.20260604@sha256:dd48690c6d74d69de115e7e196d6ef9f2a67cc846c744400fa47e1927c5e4324
    command: server /data --console-address ":9001"
    restart: unless-stopped
    user: 1026:100
    env_file:
      - minio.enc.env
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - /volume3/docker/minio/data:/data
