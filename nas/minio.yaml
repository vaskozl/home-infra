version: '3'
services:
  s3:
    image: ghcr.io/vaskozl/minio:0.20260604@sha256:c5a5eea6a8c67478721c47644a5bc82f45de6adb52872125c9e4e431d2aebf33
    command: server /data --console-address ":9001"
    restart: unless-stopped
    user: 1026:100
    env_file:
      - minio.enc.env
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - /volume3/docker/minio/data:/data
