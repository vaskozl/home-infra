version: '3'
services:
  s3:
    image: ghcr.io/vaskozl/minio:0.20260604@sha256:e900d24667fb9053f6d3547a803521e853b99eb750a989dec42eee2ad69bda1c
    command: server /data --console-address ":9001"
    restart: unless-stopped
    user: 1026:100
    env_file:
      - minio.enc.env
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - /volume3/docker/minio/data:/data
