version: '3'
services:
  s3:
    image: ghcr.io/vaskozl/minio:0.20260512@sha256:4555a02627ccc503050fac8747b61139eeb540c7bf83b06a890a39012141360f
    command: server /data --console-address ":9001"
    restart: unless-stopped
    user: 1026:100
    env_file:
      - minio.enc.env
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - /volume3/docker/minio/data:/data
