version: '3'
services:
  s3:
    image: ghcr.io/vaskozl/minio:0.20260504@sha256:e9ceaae0aada9f4241bdbe90f0da140fbfeedb16e117dd5525b33de5e38d080e
    command: server /data --console-address ":9001"
    restart: unless-stopped
    user: 1026:100
    env_file:
      - minio.enc.env
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - /volume3/docker/minio/data:/data
