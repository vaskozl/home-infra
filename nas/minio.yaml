version: '3'
services:
  s3:
    image: ghcr.io/vaskozl/minio:0.20251015@sha256:70a6b6857f3a784d675a5e774b045cbb6eac2924b63aae1eb1c5e0b935849ad6
    command: server /data --console-address ":9001"
    restart: unless-stopped
    user: 1026:100
    env_file:
      - minio.enc.env
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - /volume3/docker/minio/data:/data
