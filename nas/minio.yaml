version: '3'
services:
  s3:
    image: ghcr.io/vaskozl/minio:0.20260604@sha256:c1d077cbd15e56c3405b52e62f20793df8dfec8335411214fc4148372fa10d8e
    command: server /data --console-address ":9001"
    restart: unless-stopped
    user: 1026:100
    env_file:
      - minio.enc.env
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - /volume3/docker/minio/data:/data
