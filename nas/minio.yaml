version: '3'
services:
  s3:
    image: ghcr.io/vaskozl/minio:0.20251015@sha256:a7d8470ac556aef7d7ed39236f80b2f70e4bdaab488f2ea5aa86ec8d89df0ce6
    command: server /data --console-address ":9001"
    restart: unless-stopped
    user: 1026:100
    env_file:
      - minio.enc.env
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - /volume3/docker/minio/data:/data
