version: '3'
services:
  s3:
    image: ghcr.io/vaskozl/minio:0.20260604@sha256:5a83b47424b8cc5777dd8e8332ed15ebd69f9a558d4e0930f1c68b8fa5a605df
    command: server /data --console-address ":9001"
    restart: unless-stopped
    user: 1026:100
    env_file:
      - minio.enc.env
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - /volume3/docker/minio/data:/data
