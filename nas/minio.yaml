version: '3'
services:
  s3:
    image: ghcr.io/vaskozl/minio:0.20260512@sha256:24ce308f5e9dbd1ec131b0037543d819af9bfcd3e924b16b0c395ac5408df745
    command: server /data --console-address ":9001"
    restart: unless-stopped
    user: 1026:100
    env_file:
      - minio.enc.env
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - /volume3/docker/minio/data:/data
