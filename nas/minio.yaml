version: '3'
services:
  s3:
    image: ghcr.io/vaskozl/minio:0.20260410@sha256:94017ab888ac3c4535165768f6fbb0ba5171f4dcf91d0d5ec292f5ea1b673865
    command: server /data --console-address ":9001"
    restart: unless-stopped
    user: 1026:100
    env_file:
      - minio.enc.env
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - /volume3/docker/minio/data:/data
