version: '3'
services:
  s3:
    image: ghcr.io/vaskozl/minio:0.20251015@sha256:39a9f004111a860de861c63f5e8a599eeaf160d4cbf2868c9ccc68eee8a756e6
    command: server /data --console-address ":9001"
    restart: unless-stopped
    user: 1026:100
    env_file:
      - minio.enc.env
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - /volume3/docker/minio/data:/data
