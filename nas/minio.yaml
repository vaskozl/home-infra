version: '3'
services:
  s3:
    image: ghcr.io/vaskozl/minio:0.20260410@sha256:d1a47720fa0da9bdc013dd341702b0e952b5c6aa6e445fd34709a728b36c4574
    command: server /data --console-address ":9001"
    restart: unless-stopped
    user: 1026:100
    env_file:
      - minio.enc.env
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - /volume3/docker/minio/data:/data
