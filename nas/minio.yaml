version: '3'
services:
  s3:
    image: ghcr.io/vaskozl/minio:0.20260604@sha256:8115416219a6edf3aa150941ad15a4d89d293dcb3138a5e76925ff098bad9394
    command: server /data --console-address ":9001"
    restart: unless-stopped
    user: 1026:100
    env_file:
      - minio.enc.env
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - /volume3/docker/minio/data:/data
