version: '3'
services:
  s3:
    image: ghcr.io/vaskozl/minio:0.20251015@sha256:c74859fb2d195fe05790aafc302d251daa1d825f4785c41bb1dcd0f285c5c118
    command: server /data --console-address ":9001"
    restart: unless-stopped
    user: 1026:100
    env_file:
      - minio.enc.env
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - /volume3/docker/minio/data:/data
