version: '3'
services:
  s3:
    image: ghcr.io/vaskozl/minio:0.20260520@sha256:dd1edea6724dcbdda8e6feaeef461c71de4f0b04c004fbc42d13603426bf18bc
    command: server /data --console-address ":9001"
    restart: unless-stopped
    user: 1026:100
    env_file:
      - minio.enc.env
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - /volume3/docker/minio/data:/data
