version: '3'
services:
  s3:
    image: ghcr.io/vaskozl/minio:0.20260512@sha256:0b501bb20751c97ba8c5b3aea5b84e7d0fbe6829aadae1a50e8e6536a395aaef
    command: server /data --console-address ":9001"
    restart: unless-stopped
    user: 1026:100
    env_file:
      - minio.enc.env
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - /volume3/docker/minio/data:/data
