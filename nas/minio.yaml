version: '3'
services:
  s3:
    image: ghcr.io/vaskozl/minio:0.20260520@sha256:9fd225efecafa3faff68db77d7c51abb20fce3dcb0ab8167758b9eded40b98ca
    command: server /data --console-address ":9001"
    restart: unless-stopped
    user: 1026:100
    env_file:
      - minio.enc.env
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - /volume3/docker/minio/data:/data
