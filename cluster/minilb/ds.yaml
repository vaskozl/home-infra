# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master/daemonset-apps-v1.json

apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: minilb-dns
spec:
  template:
    spec:
      priorityClassName: system-node-critical
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      tolerations:
        - operator: Exists
          effect: NoSchedule
      serviceAccountName: minilb
      containers:
        - name: minilb
          image: ghcr.io/vaskozl/minilb:0.2.0@sha256:0c932b7ce0cdf09c302e54c34dcd3e0d9e7f2d51d7dcea108c1a33ad7c8c117f
          ports:
            - containerPort: 53
              hostPort: 5353
              name: dns
              protocol: UDP
            - containerPort: 8080
              name: healthz
          readinessProbe: &probe
            httpGet:
              path: /healthz
              port: healthz
          livenessProbe: *probe
          resources:
            requests:
              cpu: "15m"
              memory: "10Mi"
