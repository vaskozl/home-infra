# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master/daemonset-apps-v1.json

apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: minilb-dns
spec:
  template:
    spec:
      priorityClassName: system-node-critical
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      tolerations:
        - operator: Exists
          effect: NoSchedule
      serviceAccountName: minilb
      containers:
        - name: minilb
          image: ghcr.io/vaskozl/minilb:0.2.1@sha256:7cff124a1b9f5b781b3bda7e54a2ed84e962ffd0cb37b3f099b07022f0c41a1f
          ports:
            - containerPort: 53
              hostPort: 5353
              name: dns
              protocol: UDP
            - containerPort: 8080
              name: healthz
          readinessProbe: &probe
            httpGet:
              path: /healthz
              port: healthz
          livenessProbe: *probe
          resources:
            requests:
              cpu: "15m"
              memory: "10Mi"
