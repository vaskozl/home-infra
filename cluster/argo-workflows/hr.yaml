# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: argo-workflows
spec:
  interval: 24h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: '0.47.5@sha256:06ee9d12ff4f1e6d6806256372b5916a798d7df9e2bd206791760fc03061c109'
  url: oci://ghcr.io/argoproj/argo-helm/argo-workflows
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master/helmrelease-helm-v2.json

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: argo-workflows
spec:
  chartRef:
    kind: OCIRepository
    name: argo-workflows
  interval: 24h
  values:
    server:
      ingress:
        enabled: true
        hosts:
          - workflows.sko.ai
      authModes:
        - sso
      sso:
        enabled: true
        issuer: https://pi.sko.ai
        clientId:
          name: oidc
          key: client-id
        clientSecret:
          name: oidc
          key: client-secret
        redirectUrl: "https://workflows.sko.ai/oauth2/callback"
        rbac:
          enabled: false
        scopes:
          - openid
          - profile
          - groups
