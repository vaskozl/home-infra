# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master/deployment-apps-v1.json
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-victoriametrics
spec:
  template:
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mcp-victoriametrics
          image: ghcr.io/victoriametrics/mcp-victoriametrics:v1.120.1@sha256:16d9a30a6629319a8e84a73b9b54e1e9b9e5bf229bc40a7f1717c8602b0c1c09
          env:
            - name: VM_INSTANCE_ENTRYPOINT
              value: http://vmsingle-stack.victoria-metrics.svc.cluster.local:8428
            - name: VM_INSTANCE_TYPE
              value: single
            - name: MCP_SERVER_MODE
              value: http
            - name: MCP_LISTEN_ADDR
              value: :8080
            - name: MCP_LOG_FORMAT
              value: json
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 30
          resources:
            requests:
              cpu: 20m
              memory: 750Mi
            limits:
              memory: 750Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master/service-v1.json
apiVersion: v1
kind: Service
metadata:
  name: mcp-victoriametrics
spec:
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
