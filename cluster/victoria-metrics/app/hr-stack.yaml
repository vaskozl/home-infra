---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/ocirepository-source-v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: victoria-metrics-k8s-stack
  namespace: victoria-metrics
spec:
  interval: 24h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: '0.85.9'
  url: oci://ghcr.io/victoriametrics/helm-charts/victoria-metrics-k8s-stack
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vm
  namespace: victoria-metrics
spec:
  chartRef:
    kind: OCIRepository
    name: victoria-metrics-k8s-stack
  interval: 24h0m0s
  targetNamespace: victoria-metrics
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  valuesFrom:
    - kind: Secret
      name: vm-secrets
  values:
    fullnameOverride: stack
    experimentalDashboardsEnabled: false
    # Disable rules whose underlying metrics we intentionally drop:
    #   - node-exporter runs with --collector.disable-defaults and only cpu/meminfo/nfs/uname
    #     (no loadavg, vmstat, diskstats, netdev)
    #   - kubelet metricRelabelConfigs drops container_memory_swap
    #   - KubeMemoryOvercommit is expected on this 7-node cluster, not actionable
    #   - InfoInhibitor/Watchdog are meta-alerts with no consumer here
    #   - CPUThrottlingHigh only ever fires on ephemeral pods here (gitlab runner
    #     build/helper containers with intentional cpu_limit, logrotate cronjobs);
    #     throttling on short-lived CPU-bound work is expected, not actionable
    #   - TooManyLogs: > 0 threshold fires continuously on vmagent scrape warnings
    #     (steady-state baseline ~85 warn lines/5m); real failures covered by ServiceDown/TooManyRestarts
    #   - LogErrors: > 0 threshold trips on vmoperator apiserver re-init flakes;
    #     real failures covered by ReconcileErrors/HighQueueDepth
    # Control-plane rule groups (apiserver/scheduler/controller-manager) are
    # disabled: the kube*.enabled toggles below only gate scraping and dashboards,
    # not the sync-job rule sources, so these groups get created and their
    # KubeAPIDown/KubeSchedulerDown/KubeControllerManagerDown alerts fire absent()
    # even though we intentionally do not scrape the control plane on Talos.
    # Group keys must match upstream group names exactly.
    defaultRules:
      groups:
        # kubelet metricRelabelConfigs drop container_memory_swap
        k8s.rules.container_memory_swap:
          enabled: false
        kube-apiserver-availability.rules:
          enabled: false
        kube-apiserver-burnrate.rules:
          enabled: false
        kube-apiserver-histogram.rules:
          enabled: false
        kube-apiserver-slos:
          enabled: false
        kube-scheduler.rules:
          enabled: false
        kubernetes-system-apiserver:
          enabled: false
        kubernetes-system-controller-manager:
          enabled: false
        kubernetes-system-scheduler:
          enabled: false
      rules:
        KubeMemoryOvercommit:
          create: false
        InfoInhibitor:
          create: false
        Watchdog:
          create: false
        CPUThrottlingHigh:
          create: false
        TooManyLogs:
          create: false
        LogErrors:
          create: false
        "instance:node_load1_per_cpu:ratio":
          create: false
        "instance:node_vmstat_pgmajfault:rate5m":
          create: false
        "instance_device:node_disk_io_time_seconds:rate5m":
          create: false
        "instance_device:node_disk_io_time_weighted_seconds:rate5m":
          create: false
        "instance:node_network_receive_bytes_excluding_lo:rate5m":
          create: false
        "instance:node_network_transmit_bytes_excluding_lo:rate5m":
          create: false
        "instance:node_network_receive_drop_excluding_lo:rate5m":
          create: false
        "instance:node_network_transmit_drop_excluding_lo:rate5m":
          create: false
        "instance:node_network_receive_bytes_physical:rate5m":
          create: false
        "instance:node_network_transmit_bytes_physical:rate5m":
          create: false
        "instance:node_network_receive_drop_physical:rate5m":
          create: false
        "instance:node_network_transmit_drop_physical:rate5m":
          create: false
    grafana:
      image:
        registry: ghcr.io
        repository: vaskozl/grafana
        tag: 13.0.3@sha256:87ba24cbce9358c959bac2e424ccca81eedab02109ecc68ee12cec7518c6248c
      route:
        main:
          enabled: true
          labels:
            agentgateway.sko.ai/auth: oauth2
          parentRefs:
            - name: internal
              namespace: agentgateway
          annotations:
            gethomepage.dev/enabled: "true"
            gethomepage.dev/description: Server Monitoring Dashboards
            gethomepage.dev/group: Monitoring
            gethomepage.dev/icon: grafana
            gethomepage.dev/name: Grafana
            gethomepage.dev/pod-selector: "app.kubernetes.io/name=grafana"
          hostnames:
            - gf.sko.ai
      dashboardsConfigMaps:
        mixin: dashboards-mixin
        misc: dashboards-misc
        node-exporter: dashboards-node-exporter
      grafana.ini:
        auth.anonymous:
          enabled: true
          org_role: Editor
    alertmanager:
      route:
        extraLabels:
          agentgateway.sko.ai/auth: oauth2
        parentRefs:
          - name: internal
            namespace: agentgateway
        enabled: true
        hostnames:
          - am.sko.ai
      spec:
        externalURL: "https://am.sko.ai"
        image:
          repository: ghcr.io/vaskozl/prometheus-alertmanager
          tag: 0.33.0@sha256:602e39e3e7e40fcad3183f865b29814a4bdbc635bcbe93f8cd893e466ecfb637
      config:
        route:
          routes:
            # tmp: dotnet 6 sdk is no longer packaged
            - matchers:
                - alertgroup="container-vulns"
                - image="ghcr.io/vaskozl/sonarr:4.0.16@sha256:e84d53f89f4774dc62c2632300d31a3b40ff64e9c19b4f82825729ddf256830e"
              receiver: 'blackhole'
            # gitlab-sidekiq HPA is intentionally capped at 2 replicas; queueing
            # under sustained load is acceptable and not actionable.
            - matchers:
                - alertname="KubeHpaMaxedOut"
                - namespace="gitlab"
                - horizontalpodautoscaler="gitlab-sidekiq-all-in-1-v2"
              receiver: 'blackhole'
            - matchers:
                - severity=~"warning|critical"
              receiver: mail-monitoring
              repeat_interval: 24h
        receivers:
          - name: 'blackhole'
          - name: "mail-monitoring"
            email_configs:
              - to: alertmanager@sko.ai
                from: alertmanager@sko.ai
                hello: am.sko.ai
                smarthost: 'mx-maddy.mailserver.svc.cluster.local:2225'
                tls_config:
                  insecure_skip_verify: true
                send_resolved: true
                headers:
                  Subject: >
                    {{ if eq .Status "resolved" }}👌{{ end }} {{ if eq .Status "firing" }}🚨{{ end }} {{ index .CommonLabels.alertname
                    }}

                text: >
                  {{ range .Alerts }} {{ index .Annotations.description }} {{- end }}

                html: ''
    vmsingle:
      spec:
        retentionPeriod: "3"
        storage:
          resources:
            requests:
              storage: 22Gi
        resources:
          limits:
            memory: 1.2Gi
          requests:
            cpu: 530m
            memory: 1.2Gi
      route:
        enabled: true
        extraLabels:
          agentgateway.sko.ai/auth: oauth2
        parentRefs:
          - name: internal
            namespace: agentgateway
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/description: Server Metrics
          gethomepage.dev/group: Monitoring
          gethomepage.dev/icon: victoriametrics
          gethomepage.dev/name: VictoriaMetrics
          gethomepage.dev/pod-selector: "app.kubernetes.io/name=vmsingle"
        hostnames:
          - vm.sko.ai
    vmalert:
      route:
        enabled: true
        extraLabels:
          agentgateway.sko.ai/auth: oauth2
        parentRefs:
          - name: internal
            namespace: agentgateway
        hostnames:
          - va.sko.ai
    vmagent:
      spec:
        inlineScrapeConfig: |
          - job_name: "syno"
            static_configs:
            - targets: ["syno:9100"]
          - job_name: "pinewall"
            static_configs:
            - targets: ["pinewall:9100"]
          - job_name: "blocky"
            static_configs:
            - targets: ["pinewall:4000"]
        externalLabels:
          cluster: pi-cluster
        resources:
          limits:
            cpu: 1
            memory: 500Mi
          requests:
            cpu: 500m
            memory: 100Mi
      route:
        enabled: true
        hostnames:
          - vma.sko.ai
    kubelet:
      vmScrape:
        spec:
          # drop high cardinality label and useless metrics for cadvisor and kubelet
          metricRelabelConfigs:
            # Drop less useful container CPU metrics.
            - sourceLabels: [__name__]
              action: drop
              regex: 'container_cpu_(cfs_throttled_seconds_total|load_average_10s|system_seconds_total|user_seconds_total)'
            # Drop less useful / always zero container memory metrics.
            - sourceLabels: [__name__]
              action: drop
              regex: 'container_memory_(failures_total|mapped_file|swap)'
            # Drop less useful container process metrics.
            - sourceLabels: [__name__]
              action: drop
              regex: 'container_(file_descriptors|tasks_state|threads_max)'
            # Drop less useful container filesystem metrics.
            - sourceLabels: [__name__]
              action: drop
              regex: 'container_fs_(io_current|io_time_seconds_total|io_time_weighted_seconds_total|reads_merged_total|sector_reads_total|sector_writes_total|writes_merged_total)'
            # Drop less useful container blkio metrics.
            - sourceLabels: [__name__]
              action: drop
              regex: 'container_blkio_device_usage_total'
            # Drop container spec metrics that overlap with kube-state-metrics.
            - sourceLabels: [__name__]
              action: drop
              regex: 'container_spec.*'
            # Drop cgroup metrics with no pod.
            - sourceLabels: [id, pod]
              action: drop
              regex: '.+;'
            - action: drop
              sourceLabels: [__name__]
              regex: prober_probe_duration_seconds_bucket
            # Drop high-cardinality labels.
            - action: labeldrop
              regex: (uid|id|name|pod_uid|interface)
            - action: drop
              sourceLabels: [__name__]
              regex: (rest_client_request_duration_seconds_bucket|rest_client_request_duration_seconds_sum|rest_client_request_duration_seconds_count)
    # Not by most graphs or often useful
    kubeEtcd:
      enabled: false
    kubeControllerManager:
      enabled: false
    kubeProxy:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeApiServer:
      enabled: false
    prometheus-node-exporter:
      image:
        registry: ghcr.io
        repository: vaskozl/prometheus-node-exporter
        # Keep digest out of `tag` — the subchart's daemonset.yaml runs
        # `semverCompare ">=1.4.0-0" .Values.image.tag` and chokes on `@sha256:`.
        tag: 1.11.1
        digest: sha256:8839c56f98b90753481451146c1f44bc3e681e7ca43359d274137035b2159eba
      extraArgs:
        - --collector.disable-defaults
        - --collector.uname
        - --collector.cpu
        - --collector.meminfo
        - --collector.nfs
