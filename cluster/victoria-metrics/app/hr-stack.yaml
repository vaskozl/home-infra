---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/ocirepository-source-v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: victoria-metrics-k8s-stack
  namespace: victoria-metrics
spec:
  interval: 24h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: '0.78.0'
  url: oci://ghcr.io/victoriametrics/helm-charts/victoria-metrics-k8s-stack
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vm
  namespace: victoria-metrics
spec:
  chartRef:
    kind: OCIRepository
    name: victoria-metrics-k8s-stack
  interval: 24h0m0s
  targetNamespace: victoria-metrics
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  valuesFrom:
    - kind: Secret
      name: vm-secrets
  values:
    fullnameOverride: stack
    experimentalDashboardsEnabled: false
    grafana:
      image:
        registry: ghcr.io
        repository: vaskozl/grafana
        tag: 13.0.1@sha256:134661c0a173f97e543b8071b3cdcf72575ae352dd6dbcd54f8c4f17764969c3
      route:
        main:
          enabled: true
          parentRefs:
            - name: internal
              namespace: agentgateway
          annotations:
            gethomepage.dev/enabled: "true"
            gethomepage.dev/description: Server Monitoring Dashboards
            gethomepage.dev/group: Monitoring
            gethomepage.dev/icon: grafana
            gethomepage.dev/name: Grafana
            gethomepage.dev/pod-selector: "app.kubernetes.io/name=grafana"
          hostnames:
            - gf.sko.ai
      dashboardsConfigMaps:
        mixin: dashboards-mixin
        misc: dashboards-misc
        node-exporter: dashboards-node-exporter
      grafana.ini:
        auth.anonymous:
          enabled: true
          org_role: Editor
    alertmanager:
      route:
        parentRefs:
          - name: internal
            namespace: agentgateway
        enabled: true
        hostnames:
          - am.sko.ai
      spec:
        externalURL: "https://am.sko.ai"
        image:
          repository: ghcr.io/vaskozl/prometheus-alertmanager
          tag: 0.32.1@sha256:165bb53e26af05d28e64d3e92c20b2520d459326ed31d2dc43c12f919b4e2dc6
      config:
        route:
          routes:
            - matchers:
                - alertname=~"WatchDog|InfoInhibitor|KubeMemoryOvercommit"
              receiver: 'blackhole'
            # tmp: dotnet 6 sdk is no longer packaged
            - matchers:
                - alertgroup="container-vulns"
                - image="ghcr.io/vaskozl/sonarr:4.0.16@sha256:e84d53f89f4774dc62c2632300d31a3b40ff64e9c19b4f82825729ddf256830e"
              receiver: 'blackhole'
            - matchers:
                - severity=~"warning|critical"
              receiver: mail-monitoring
              repeat_interval: 24h
        receivers:
          - name: 'blackhole'
          - name: "mail-monitoring"
            email_configs:
              - to: alertmanager@sko.ai
                from: alertmanager@sko.ai
                hello: am.sko.ai
                smarthost: 'mx-maddy.mailserver.svc.cluster.local:2225'
                tls_config:
                  insecure_skip_verify: true
                send_resolved: true
                headers:
                  Subject: >
                    {{ if eq .Status "resolved" }}👌{{ end }} {{ if eq .Status "firing" }}🚨{{ end }} {{ index .CommonLabels.alertname
                    }}

                text: >
                  {{ range .Alerts }} {{ index .Annotations.description }} {{- end }}

                html: ''
    vmsingle:
      spec:
        retentionPeriod: "3"
        storage:
          resources:
            requests:
              storage: 22Gi
        resources:
          limits:
            memory: 1.2Gi
          requests:
            cpu: 530m
            memory: 1.2Gi
      route:
        enabled: true
        parentRefs:
          - name: internal
            namespace: agentgateway
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/description: Server Metrics
          gethomepage.dev/group: Monitoring
          gethomepage.dev/icon: victoriametrics
          gethomepage.dev/name: VictoriaMetrics
          gethomepage.dev/pod-selector: "app.kubernetes.io/name=vmsingle"
        hostnames:
          - vm.sko.ai
    vmalert:
      route:
        enabled: true
        parentRefs:
          - name: internal
            namespace: agentgateway
        hostnames:
          - va.sko.ai
    vmagent:
      spec:
        inlineScrapeConfig: |
          - job_name: "syno"
            static_configs:
            - targets: ["syno:9100"]
          - job_name: "pinewall"
            static_configs:
            - targets: ["pinewall:9100"]
          - job_name: "blocky"
            static_configs:
            - targets: ["pinewall:4000"]
        externalLabels:
          cluster: pi-cluster
        resources:
          limits:
            cpu: 1
            memory: 500Mi
          requests:
            cpu: 500m
            memory: 100Mi
      route:
        enabled: true
        hostnames:
          - vma.sko.ai
    kubelet:
      vmScrape:
        spec:
          # drop high cardinality label and useless metrics for cadvisor and kubelet
          metricRelabelConfigs:
            # Drop less useful container CPU metrics.
            - sourceLabels: [__name__]
              action: drop
              regex: 'container_cpu_(cfs_throttled_seconds_total|load_average_10s|system_seconds_total|user_seconds_total)'
            # Drop less useful / always zero container memory metrics.
            - sourceLabels: [__name__]
              action: drop
              regex: 'container_memory_(failures_total|mapped_file|swap)'
            # Drop less useful container process metrics.
            - sourceLabels: [__name__]
              action: drop
              regex: 'container_(file_descriptors|tasks_state|threads_max)'
            # Drop less useful container filesystem metrics.
            - sourceLabels: [__name__]
              action: drop
              regex: 'container_fs_(io_current|io_time_seconds_total|io_time_weighted_seconds_total|reads_merged_total|sector_reads_total|sector_writes_total|writes_merged_total)'
            # Drop less useful container blkio metrics.
            - sourceLabels: [__name__]
              action: drop
              regex: 'container_blkio_device_usage_total'
            # Drop container spec metrics that overlap with kube-state-metrics.
            - sourceLabels: [__name__]
              action: drop
              regex: 'container_spec.*'
            # Drop cgroup metrics with no pod.
            - sourceLabels: [id, pod]
              action: drop
              regex: '.+;'
            - action: drop
              sourceLabels: [__name__]
              regex: prober_probe_duration_seconds_bucket
            # Drop high-cardinality labels.
            - action: labeldrop
              regex: (uid|id|name|pod_uid|interface)
            - action: drop
              sourceLabels: [__name__]
              regex: (rest_client_request_duration_seconds_bucket|rest_client_request_duration_seconds_sum|rest_client_request_duration_seconds_count)
    # Not by most graphs or often useful
    kubeEtcd:
      enabled: false
    kubeControllerManager:
      enabled: false
    kubeProxy:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeApiServer:
      enabled: false
    prometheus-node-exporter:
      image:
        registry: ghcr.io
        repository: vaskozl/prometheus-node-exporter
        tag: 1.11.1@sha256:b737b3f6752093cc02f0b98b37bd5c8e25fc70132724fa95e95709b73c7b063a
        digest: sha256:9cef742bcd4cd37923068c2ea0344315457d60cfe3ec60cd27d572ea0891dd81
      extraArgs:
        - --collector.disable-defaults
        - --collector.uname
        - --collector.cpu
        - --collector.meminfo
        - --collector.nfs
