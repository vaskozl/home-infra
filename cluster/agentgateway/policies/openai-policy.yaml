apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: openai-secret-masking
  namespace: agentgateway
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: lmstudio
  backend:
    ai:
      promptGuard:
        request:
          - regex:
              action: Mask
              matches:
                # AWS Access Key ID
                - "\\bAKIA[0-9A-Z]{16}\\b"
                # Stripe keys
                - "\\bsk-[a-zA-Z0-9_-]{20,}\\b"
                # Password/token assignments
                - "(?i)(password|passwd|secret|token|api[_-]?key)\\s*[=:]\\s*[\"']?[^\\s\"']{8,}"
                # RSA/EC Private keys
                - "-----BEGIN\\s+(RSA\\s+|EC\\s+)?PRIVATE KEY-----"
                # Database connection strings
                - "(?i)(mongodb|postgres|postgresql|mysql|redis)://[^\\s\"'<>]{10,}"
            response:
              message: "Response filtered: credentials redacted from model output."
