apiVersion: v1
kind: Service
metadata:
  name: redis-headless
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: tcp
      port: 6379
      targetPort: tcp
    - name: sentinel
      port: 26379
      targetPort: 26379
---
apiVersion: v1
kind: Service
metadata:
  name: redis-master
spec:
  selector:
    isMaster: "true"
  ports:
    - name: tcp
      port: 6379
      targetPort: tcp
---
apiVersion: v1
kind: Service
metadata:
  name: redis-sentinel
spec:
  ports:
    - name: sentinel
      port: 26379
      targetPort: 26379
