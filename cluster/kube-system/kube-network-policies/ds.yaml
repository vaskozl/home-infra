# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master/daemonset-apps-v1.json
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kube-network-policies
spec:
  template:
    spec:
      hostNetwork: true
      priorityClassName: system-node-critical
      nodeSelector:
        kubernetes.io/os: linux
      tolerations:
        - operator: Exists
          effect: NoSchedule
      serviceAccountName: kube-network-policies
      containers:
        - name: kube-network-policies
          image: ghcr.io/vaskozl/kube-network-policies:1.0.0@sha256:9d39bf32d6237f7fb928ad4b8b402ec6ade250a36a721857503f7f630ca3c9f1
          args:
            - --hostname-override=$(MY_NODE_NAME)
            - -v=1
          volumeMounts:
            - name: nri-plugin
              mountPath: /var/run/nri
            - name: netns
              mountPath: /var/run/netns
              mountPropagation: HostToContainer
          resources:
            requests:
              cpu: "100m"
              memory: "50Mi"
          securityContext:
            privileged: true
            runAsUser: 0
            capabilities:
              add: ["NET_ADMIN"]
          env:
            - name: MY_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
      volumes:
        - name: nri-plugin
          hostPath:
            path: /var/run/nri
        - name: netns
          hostPath:
            path: /var/run/netns
