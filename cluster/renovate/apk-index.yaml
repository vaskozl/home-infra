apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: apk
  annotations:
    patch.sko.ai/app-template: common
spec:
  interval: 24h
  chart:
    spec:
      chart: app-template
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      version: 5.0.1
  values:
    controllers:
      wolfi:
        containers:
          app:
            image:
              repository: ghcr.io/vaskozl/renovate-apk-indexer
              tag: 0.2.0@sha256:a9386cac57983922101b4d0a2d9bdf8ac5602b4f048d1746d6c48237433d1ff6
            args:
              - ENC[AES256_GCM,data:/b4422jNT6Bm7nVTM+U=,iv:CHKlb4OV3pNZAqpEc+yVpJG0BSlpDz4CduJDjO4FTk4=,tag:rXX8xSm+/y3H9LmNyeNibQ==,type:str]
