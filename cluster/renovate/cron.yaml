# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master/cronjob-batch-v1.json
# yaml-lanaguage-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/refs/heads/master/master/cronjob-batch-v1.json
apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate
spec:
  schedule: '15 3,4 * * *'
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          nodeSelector:
            kubernetes.io/arch: amd64
          containers:
            - name: renovate
              image: ghcr.io/vaskozl/renovate:43.170.15@sha256:f059de288befcb5ea7ad7b508ef7ba95227ef13e25eb60e08c562e88b63673ab
              # Environment Variables
              env:
                - name: LOG_LEVEL
                  value: debug
                - name: BINARY_SOURCE
                  value: install
                # Allows the epoch-reset postUpgradeTask defined in packages/renovate.json5.
                # Pattern (after JSON decode): ^sed -i -E 's[^']+' '[^']+\.ya?ml'$
                # Matches: sed -i -E 's/<expr>' '<name>.yaml' — requires sed -i -E, a
                # single-quoted substitution, and a .yaml/.yml filename argument.
                - name: RENOVATE_ALLOWED_COMMANDS
                  value: |-
                    ["^sed -i -E 's[^']+' '[^']+\\.ya?ml'$"]
              envFrom:
                - secretRef:
                    name: renovate-env
              resources:
                requests:
                  cpu: 740m
                  memory: 1.3Gi
                limits:
                  memory: 1.3Gi
              securityContext:
                allowPrivilegeEscalation: false
          restartPolicy: Never
