# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitlab-runner-arm64
  namespace: gitlab
spec:
  interval: 24h
  chart:
    spec:
      chart: gitlab-runner
      version: 0.88.3
      sourceRef:
        kind: HelmRepository
        name: gitlab
        namespace: flux-system
      interval: 24h
  values:
    gitlabUrl: https://gitlab.sko.ai
    concurrent: 1
    rbac:
      create: true
    serviceAccount:
      create: true
    runners:
      secret: arm64-gitlab-runner-secret
      runUntagged: false
      tags: [arm64]
      nodeSelector:
        kubernetes.io/arch: arm64
      config: |
        [[runners]]
          [runners.kubernetes]
            helper_image = "ghcr.io/vaskozl/gitlab-runner-helper:latest"
            cpu_request = "500m"
            cpu_limit = "1"
            memory_request = "2Gi"
            memory_limit = "7Gi"
            service_cpu_request = "100m"
            service_cpu_limit = "1"
            service_memory_request = "50Mi"
            service_memory_limit = "1Gi"
            helper_cpu_request = "5m"
            helper_cpu_limit = "500m"
            helper_memory_request = "50Mi"
            helper_memory_limit = "200Mi"
            poll_interval = 5
            poll_timeout = 600
            # Used by bubblewrap
            cap_add = ["NET_ADMIN", "SYS_ADMIN"]
            [[runners.kubernetes.volumes.empty_dir]]
              name = "docker-emptydir"
              mount_path = "/var/run"
              medium = "Memory"
            [[runners.kubernetes.volumes.pvc]]
              name = "apk-repo-pvc"
              mount_path = "/apks"
            [runners.kubernetes.node_selector]
              "kubernetes.io/arch" = "arm64"
    image:
      registry: ghcr.io
      image: vaskozl/gitlab-runner
      repository: vaskozl/gitlab-runner
      tag: 18.11.3@sha256:5e11b092daab2820d52b5011cb98a60b33708db37c5dc7bfb062d37879cc2c8e
