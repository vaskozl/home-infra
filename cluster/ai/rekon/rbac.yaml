apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rekon-readonly
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rekon-readonly
subjects:
  - kind: ServiceAccount
    name: rekon
    namespace: ai
roleRef:
  kind: ClusterRole
  name: rekon-readonly
  apiGroup: rbac.authorization.k8s.io
