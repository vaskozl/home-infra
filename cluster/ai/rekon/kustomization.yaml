# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ai
resources:
  - hr.yaml
  - rbac.yaml
    #  - ../../gitlab/buildkit/buildkit-client-certs.yaml
secretGenerator:
  - name: rekon-env
    envs:
      - claude.enc.env
  - name: config
    options:
      annotations:
        kustomize.toolkit.fluxcd.io/substitute: disabled
    files:
      - claude-settings.json=config/claude-settings.json
      - CLAUDE.md=config/CLAUDE.md
      - agents.yaml=config/agents.yaml
      - policy.yaml=config/policy.yaml
      - repos.yaml=config/repos.yaml
      - apko-chainguard.yaml=config/apko-chainguard.yaml
      - apko-chainguard-extra.yaml=config/apko-chainguard-extra.yaml
      - apko-apks.yaml=config/apko-apks.yaml
      - apko-wolfi-base.yaml=config/apko-wolfi-base.yaml
      - apko-containers.yaml=config/apko-containers.yaml
      - providers.yaml=config/providers.yaml
configurations:
  - kustomizeconfig.yaml
