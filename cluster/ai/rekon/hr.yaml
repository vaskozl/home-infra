# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  annotations:
    patch.sko.ai/app-template: common
  name: rekon
  namespace: ai
spec:
  chart:
    spec:
      chart: app-template
      interval: 24h
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      version: 5.0.1
  interval: 24h
  values:
    controllers:
      main:
        type: statefulset
        serviceAccount:
          identifier: rekon
        pod:
          hostUsers: false
          securityContext:
            fsGroup: 568
            fsGroupChangePolicy: OnRootMismatch
        statefulset:
          volumeClaimTemplates:
            - accessMode: ReadWriteOnce
              globalMounts:
                - path: /home/nonroot
              name: home
              size: 20Gi
        initContainers:
          mcp-setup:
            image: &claudeImage
              repository: ghcr.io/vaskozl/claude
              tag: 2.1.215@sha256:5dc3a3abd3cdec8301be7e8a6e3fda61cea08944727b7336d3994e5286b1ba73
            command: ["sh", "-c"]
            args:
              - |
                mkdir -p /home/nonroot/.claude
                [ -f /home/nonroot/.claude/settings.json ] || cp /home/nonroot/config/claude-settings.json /home/nonroot/.claude/settings.json
                [ -f /home/nonroot/.claude/CLAUDE.md ] || cp /home/nonroot/config/CLAUDE.md /home/nonroot/.claude/CLAUDE.md
                claude mcp remove -s user victoriametrics 2>/dev/null
                claude mcp remove -s user chrome-devtools 2>/dev/null
                claude mcp add -s user --transport http victoriametrics http://mcp-victoriametrics.victoria-metrics.svc.cluster.local:8080/mcp
                claude mcp add -s user --transport http chrome-devtools http://127.0.0.1:8080/mcp
            securityContext: &security-context
              allowPrivilegeEscalation: true
              procMount: Unmasked
              runAsGroup: 568
              runAsUser: 568
              seccompProfile:
                type: Unconfined
        containers:
          app:
            image:
              repository: ghcr.io/vaskozl/rekon-pkgupdate
              tag: 0.0.34@sha256:95271ca799272ffb450557884d4e4f383d61281d0a9041c17cba5a074aedeb95
            args:
              - -redis
              - redis-master:6379
              - -v
            env:
              DISABLE_TELEMETRY: "1"
              DISABLE_BUG_COMMAND: "1"
              DISABLE_AUTOUPDATER: "1"
              DISABLE_ERROR_REPORTING: "1"
              # The operator org's id = DeriveID(org displayName "Doudous").
              OPERATOR_ORG: ujcwdrohelak
            envFrom:
              - secretRef:
                  name: rekon-env
            resources:
              limits:
                memory: 8Gi
              requests:
                cpu: 200m
                memory: 1Gi
            securityContext: *security-context
          chromium:
            image:
              repository: ghcr.io/vaskozl/chromium
              tag: 149.0.7827.200@sha256:36a910b415e63eeb075bfe8ae5a3446da1a5f141078584d8c4ab8c7f8857f865
            args:
              - --headless
              - --remote-debugging-port=9222
              - --no-sandbox
            resources:
              limits:
                memory: 1500Mi
              requests:
                cpu: 100m
                memory: 500Mi
          chrome-devtools-mcp:
            image:
              repository: cgr.dev/chainguard/node
              tag: latest@sha256:5280e63c3d2c81366056926b79f27f70e4adbd3a03a5b45c53503eac2b722b3f
            command: ["npx"]
            args:
              - -y
              - mcp-proxy@6.5.1
              - --transport
              - streamablehttp
              - --port
              - "8080"
              - --
              - npx
              - -y
              - chrome-devtools-mcp@1.1.1
              - --browserUrl=http://127.0.0.1:9222
            resources:
              limits:
                memory: 1Gi
              requests:
                cpu: 50m
                memory: 600Mi
    defaultPodOptions:
      automountServiceAccountToken: true
      nodeSelector:
        kubernetes.io/arch: amd64
    persistence:
      #buildkit-certs:
      #  type: secret
      #  name: buildkit-client-certs
      #  advancedMounts:
      #    main:
      #      app:
      #        - path: /etc/buildkit/certs
      #          readOnly: true
      docker-config:
        type: secret
        name: rekon-docker-config
        advancedMounts:
          main:
            app:
              - path: /home/nonroot/.docker/config.json
                subPath: config.json
      config:
        type: secret
        name: config
        advancedMounts:
          main:
            app:
              - path: /home/nonroot/config
            mcp-setup:
              - path: /home/nonroot/config
      screenshots:
        type: emptyDir
        advancedMounts:
          main:
            app:
              - path: /tmp/screenshots
            chrome-devtools-mcp:
              - path: /tmp/screenshots
      turn-fifo:
        type: emptyDir
        medium: Memory
        sizeLimit: 1Mi
        advancedMounts:
          main:
            app:
              - path: /run/claude
    route:
      app:
        hostnames:
          - rekon.sko.ai
        labels:
          agentgateway.sko.ai/auth: oauth2
        parentRefs:
          - name: internal
            namespace: agentgateway
        rules:
          - backendRefs:
              - identifier: app
                port: 8088
    service:
      app:
        controller: main
        ports:
          http:
            port: 8088
