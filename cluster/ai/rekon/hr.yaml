# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  annotations:
    patch.sko.ai/app-template: common
  name: rekon
  namespace: ai
spec:
  chart:
    spec:
      chart: app-template
      interval: 24h
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      version: 5.0.1
  interval: 24h
  values:
    controllers:
      main:
        type: statefulset
        serviceAccount:
          identifier: rekon
        pod:
          hostUsers: false
          securityContext:
            fsGroup: 568
            fsGroupChangePolicy: OnRootMismatch
        statefulset:
          volumeClaimTemplates:
            - accessMode: ReadWriteOnce
              globalMounts:
                - path: /home/nonroot
              name: home
              size: 20Gi
        initContainers:
          mcp-setup:
            image: &claudeImage
              repository: ghcr.io/vaskozl/claude
              tag: 2.1.193@sha256:f18d8cf22e70d8850699c01a2ef880d209cacd5de54e0285674e9ad6b9977e9d
            command: ["sh", "-c"]
            args:
              - |
                echo claude mcp remove -s user victoriametrics 2>/dev/null
                echo claude mcp remove-s user  chrome-devtools 2>/dev/null
                echo claude mcp add -s user --transport http victoriametrics http://mcp-victoriametrics.victoria-metrics.svc.cluster.local:8080/mcp
                echo claude mcp add -s user --transport http chrome-devtools http://127.0.0.1:8080/mcp
        containers:
          app:
            image:
              repository: ghcr.io/vaskozl/rekon-pkgupdate
              tag: 0.0.18@sha256:3c4caea45ed07b0eff5b2e2492fcf46f0c6338bd1492ed87b5f1eccfe3d1b747
            args:
              - -redis
              - rekon-redis:6379
              - -v
            env:
              DISABLE_TELEMETRY: "1"
              DISABLE_BUG_COMMAND: "1"
              DISABLE_AUTOUPDATER: "1"
              DISABLE_ERROR_REPORTING: "1"
              OPERATOR_ORG: doudous
            envFrom:
              - secretRef:
                  name: rekon-env
            resources:
              limits:
                memory: 5.5Gi
              requests:
                cpu: 200m
                memory: 384Mi
            securityContext:
              allowPrivilegeEscalation: true
              procMount: Unmasked
              runAsGroup: 568
              runAsUser: 568
              seccompProfile:
                type: Unconfined
          chromium:
            image:
              repository: ghcr.io/vaskozl/chromium
              tag: 149.0.7827.196@sha256:46695dd750e4697d3d6fad4613b81227ab29f21a0449696965b99a731fec5327
            args:
              - --headless
              - --remote-debugging-port=9222
              - --no-sandbox
            resources:
              limits:
                memory: 1500Mi
              requests:
                cpu: 100m
                memory: 500Mi
          chrome-devtools-mcp:
            image:
              repository: cgr.dev/chainguard/node
              tag: latest@sha256:955b52dd59f8a73419fe1931e13a9b9eb822e7e5fda21ca754688b55753ea6ca
            command: ["npx"]
            args:
              - -y
              - mcp-proxy@latest
              - --transport
              - streamablehttp
              - --port
              - "8080"
              - --
              - npx
              - -y
              - chrome-devtools-mcp@latest
              - --browserUrl=http://127.0.0.1:9222
            resources:
              limits:
                memory: 1Gi
              requests:
                cpu: 50m
                memory: 600Mi
      redis:
        type: statefulset
        pod:
          securityContext:
            fsGroup: 568
            fsGroupChangePolicy: OnRootMismatch
        statefulset:
          podManagementPolicy: Parallel
          volumeClaimTemplates:
            - accessMode: ReadWriteOnce
              globalMounts:
                - path: /data
              name: data
              size: 1Gi
        containers:
          app:
            image:
              repository: ghcr.io/vaskozl/redis
              tag: 8.6.4@sha256:acec70ebcc5b6340e2be43e48a3eea5c27be8d5f1bf20bb9ba15034929d171e2
            args:
              - --appendonly
              - "yes"
              - --protected-mode
              - "no"
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              limits:
                memory: 250Mi
              requests:
                cpu: 10m
                memory: 250Mi
    defaultPodOptions:
      automountServiceAccountToken: true
      nodeSelector:
        kubernetes.io/arch: amd64
    persistence:
      #buildkit-certs:
      #  type: secret
      #  name: buildkit-client-certs
      #  advancedMounts:
      #    main:
      #      app:
      #        - path: /etc/buildkit/certs
      #          readOnly: true
      docker-config:
        type: secret
        name: rekon-docker-config
        advancedMounts:
          main:
            app:
              - path: /home/nonroot/.docker/config.json
                subPath: config.json
      config:
        type: secret
        name: config
        advancedMounts:
          main:
            app:
              - path: /home/nonroot/config
              - path: /home/nonroot/.claude/settings.json
                subPath: claude-settings.json
              - path: /home/nonroot/.claude/CLAUDE.md
                subPath: CLAUDE.md
      screenshots:
        type: emptyDir
        advancedMounts:
          main:
            app:
              - path: /tmp/screenshots
            chrome-devtools-mcp:
              - path: /tmp/screenshots
      turn-fifo:
        type: emptyDir
        medium: Memory
        sizeLimit: 1Mi
        advancedMounts:
          main:
            app:
              - path: /run/claude
    route:
      app:
        hostnames:
          - rekon.sko.ai
        labels:
          agentgateway.sko.ai/auth: oauth2
        parentRefs:
          - name: internal
            namespace: agentgateway
        rules:
          - backendRefs:
              - identifier: app
                port: 8088
    service:
      app:
        controller: main
        ports:
          http:
            port: 8088
      redis:
        controller: redis
        ports:
          redis:
            port: 6379
