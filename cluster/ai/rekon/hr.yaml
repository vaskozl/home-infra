# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  annotations:
    patch.sko.ai/app-template: common
  name: rekon
  namespace: ai
spec:
  chart:
    spec:
      chart: app-template
      interval: 24h
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
      version: 5.0.1
  interval: 24h
  values:
    controllers:
      main:
        type: statefulset
        serviceAccount:
          identifier: rekon
        pod:
          hostUsers: false
          securityContext:
            fsGroup: 568
            fsGroupChangePolicy: OnRootMismatch
        statefulset:
          volumeClaimTemplates:
            - accessMode: ReadWriteOnce
              globalMounts:
                - path: /home/nonroot
              name: home
              size: 20Gi
        initContainers:
          mcp-setup:
            image: &claudeImage
              repository: ghcr.io/vaskozl/claude
              tag: 2.1.177@sha256:5a0127c45cd52b2102956326c943a0f0e6f9cdd71eec2528084ce80b32d2501d
            command: ["sh", "-c"]
            args:
              - |
                echo claude mcp remove -s user victoriametrics 2>/dev/null
                echo claude mcp remove-s user  chrome-devtools 2>/dev/null
                echo claude mcp add -s user --transport http victoriametrics http://mcp-victoriametrics.victoria-metrics.svc.cluster.local:8080/mcp
                echo claude mcp add -s user --transport http chrome-devtools http://127.0.0.1:8080/mcp
        containers:
          app:
            image:
              repository: ghcr.io/vaskozl/rekon-pkgupdate
              tag: 0.0.8@sha256:f6963362039e95b7beace3f8769f5a80ff09c7bab2c65f7c4b494c623eeb6f97
            args:
              - -redis
              - rekon-redis:6379
              - -v
            env:
              DISABLE_TELEMETRY: "1"
              DISABLE_BUG_COMMAND: "1"
              DISABLE_AUTOUPDATER: "1"
              DISABLE_ERROR_REPORTING: "1"
            envFrom:
              - secretRef:
                  name: rekon-env
            resources:
              limits:
                memory: 2.5Gi
              requests:
                cpu: 200m
                memory: 384Mi
            securityContext:
              allowPrivilegeEscalation: true
              procMount: Unmasked
              runAsGroup: 568
              runAsUser: 568
              seccompProfile:
                type: Unconfined
          chromium:
            image:
              repository: ghcr.io/vaskozl/chromium
              tag: 149.0.7827.53@sha256:2626354790efd90cdeae1b46c147eb2da86840a68af87bdc12fdc6857d7dc062
            args:
              - --headless
              - --remote-debugging-port=9222
              - --no-sandbox
            resources:
              limits:
                memory: 1500Mi
              requests:
                cpu: 100m
                memory: 500Mi
          chrome-devtools-mcp:
            image:
              repository: cgr.dev/chainguard/node
              tag: latest@sha256:27bf957bdf6d189108c8908c958fd966d9814f78e7172c2d791940f4e208a334
            command: ["npx"]
            args:
              - -y
              - mcp-proxy@latest
              - --transport
              - streamablehttp
              - --port
              - "8080"
              - --
              - npx
              - -y
              - chrome-devtools-mcp@latest
              - --browserUrl=http://127.0.0.1:9222
            resources:
              limits:
                memory: 1Gi
              requests:
                cpu: 50m
                memory: 600Mi
      redis:
        type: statefulset
        pod:
          securityContext:
            fsGroup: 568
            fsGroupChangePolicy: OnRootMismatch
        statefulset:
          podManagementPolicy: Parallel
          volumeClaimTemplates:
            - accessMode: ReadWriteOnce
              globalMounts:
                - path: /data
              name: data
              size: 1Gi
        containers:
          app:
            image:
              repository: ghcr.io/vaskozl/redis
              tag: 8.6.2@sha256:fb799b3b0a1e6c84fc01b3b157d616e17a85245feaa816bc38410685503f22ff
            args:
              - --appendonly
              - "yes"
              - --protected-mode
              - "no"
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
            resources:
              limits:
                memory: 250Mi
              requests:
                cpu: 10m
                memory: 250Mi
    defaultPodOptions:
      automountServiceAccountToken: true
      nodeSelector:
        kubernetes.io/arch: amd64
    persistence:
      #buildkit-certs:
      #  type: secret
      #  name: buildkit-client-certs
      #  advancedMounts:
      #    main:
      #      app:
      #        - path: /etc/buildkit/certs
      #          readOnly: true
      config:
        type: configMap
        name: config
        advancedMounts:
          main:
            app:
              - path: /home/nonroot/config
              - path: /home/nonroot/.claude/settings.json
                subPath: claude-settings.json
              - path: /home/nonroot/.claude/CLAUDE.md
                subPath: CLAUDE.md
      screenshots:
        type: emptyDir
        advancedMounts:
          main:
            app:
              - path: /tmp/screenshots
            chrome-devtools-mcp:
              - path: /tmp/screenshots
      turn-fifo:
        type: emptyDir
        medium: Memory
        sizeLimit: 1Mi
        advancedMounts:
          main:
            app:
              - path: /run/claude
    route:
      app:
        hostnames:
          - rekon.sko.ai
        labels:
          agentgateway.sko.ai/auth: oauth2
        parentRefs:
          - name: internal
            namespace: agentgateway
        rules:
          - backendRefs:
              - identifier: app
                port: 8088
    service:
      app:
        controller: main
        ports:
          http:
            port: 8088
      redis:
        controller: redis
        ports:
          redis:
            port: 6379
