# The operator user, pinned so its metadata.id is stable and can be named in the
# doudous org's owners (OPERATOR_ORG=doudous), which is what grants superuser. Login
# adopts this record via the seeded identities pointer (identities.yaml); the profile
# fields (status.*) fill in from the OIDC claims on first login. Since rekon !439 the
# durable user id is store-minted, not derived from the OIDC subject, so it can no
# longer be predicted -- pinning it here (plus the pointer) is the declarative way to
# keep a known operator id.
apiVersion: v1alpha1
kind: users
metadata:
  id: vasko
