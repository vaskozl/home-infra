# The operator user. User is keyed on spec.subject, so its metadata.id is
# DeriveID(subject) for the provider-scoped subject ("<provider>:<sub>"). The
# identities pointer (identities.yaml) lets login adopt this record; status.* fills
# from the OIDC claims on login. Naming this user in the operator org's owners
# (OPERATOR_ORG) grants superuser.
apiVersion: v1alpha1
kind: users
spec:
  subject: "dmqg3emd3xp2:096e2ba1-0272-4fae-be5e-9f3d76c66a0d"
