# Login-lookup pointer: maps the Pocket ID identity key (the provider's id
# "dmqg3emd3xp2" = DeriveID("pi"), plus the OIDC sub) to the operator user, so login
# adopts this user. Identity is keyed on spec.key, so its metadata.id is DeriveID(key)
# -- the id the resolver computes at login. spec.user is a plain string (not a ref),
# so it holds the operator user's metadata.id = DeriveID(subject) = ue6lqmaw6jrg. It
# equals DeriveID(the users.yaml subject); recompute if the key changes.
apiVersion: v1
kind: identities
spec:
  key: "dmqg3emd3xp2:096e2ba1-0272-4fae-be5e-9f3d76c66a0d"
  user: ue6lqmaw6jrg
