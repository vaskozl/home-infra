# Default update policy attaching to every Package/Image via a wildcard
# selector: allow minor/patch/digest auto-MRs, labeled "renovate", and automerge
# them once CI passes (the MR reconciler gates on the head pipeline). rebase is
# off, so an open bump branch isn't force-pushed just because its base moved
# (only a real change to the bump re-pushes).
apiVersion: v1alpha1
kind: updatepolicies
metadata:
  id: package-defaults
spec:
  name: package defaults
  match: 'self.kind == "Pakage"'
  matchNames: ["*"]
  updateTypes: [major, minor, patch, digest]
  automergeTypes: [major, minor, patch, digest]
  automerge: 'true'
  rebase: 'true'
  labels: [renovate,pkgupdate]
---
apiVersion: v1alpha1
kind: updatepolicies
metadata:
  id: image-automerge
spec:
  name: image automerge
  match: 'self.kind == "Image" && self.metadata.id != "home-infra-pocket-id-8ac69735"'
  matchNames: ["*"]
  updateTypes: [major, minor, patch, digest]
  automergeTypes: [patch, digest]
  rebase: 'true'
  labels: [renovate,pkgupdate]
