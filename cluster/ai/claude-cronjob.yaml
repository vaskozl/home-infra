apiVersion: batch/v1
kind: CronJob
metadata:
  name: claude
spec:
  schedule: "0 0 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          nodeSelector:
            kubernetes.io/arch: amd64
          containers:
            - name: claude
              image: ghcr.io/vaskozl/claude:2.1.76
              args:
                - --dangerously-skip-permissions
                - -p
                - |
                  View repos you have access to in Gitlab. Clone them if needed.
                  Review MRs you are able to that have not been reviewed before.
                  Post your reviews on each.
              envFrom:
                - secretRef:
                    name: claude-env
              volumeMounts:
                - name: claudemd
                  mountPath: /home/nonroot/.claude/CLAUDE.md
                  subPath: CLAUDE.md
                - name: claude
                  mountPath: /home/nonroot/.claude
          volumes:
            - name: claudemd
              configMap:
                name: claude-md
            - name: claude
              persistentVolumeClaim:
                claimName: claude-pvc
