apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: common
spec:
  minReplicaCount: 0
  maxReplicaCount: 1
  # Scale to 0 during Anthropic peak hours (weekdays 13:00-19:00 UTC).
  # When inactive, minReplicaCount=0 applies. Friday start covers the full weekend.
  triggers:
    - type: cron
      metadata:
        timezone: UTC
        start: "0 19 * * 1-5"
        end: "0 13 * * 1-5"
        desiredReplicas: "1"
