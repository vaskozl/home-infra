# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master/statefulset-apps-v1.json
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: common
spec:
  serviceName: claude
  volumeClaimTemplates:
    - metadata:
        name: claude
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
  template:
    spec:
      serviceAccountName: claude
      hostUsers: false
      shareProcessNamespace: true
      securityContext:
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
      nodeSelector:
        kubernetes.io/arch: amd64
      initContainers:
        - name: mcp-setup
          image: &image ghcr.io/vaskozl/claude:2.1.113@sha256:3fe3e321f02ae51cb818648071f36a47bbc85cf1347dfe3148dd684e7b8056c7
          command: ["sh", "-c"]
          args:
            - |
              claude mcp remove chrome-devtools 2>/dev/null
              claude mcp add --transport http chrome-devtools http://127.0.0.1:8080/mcp
              claude mcp remove victoriametrics 2>/dev/null
              claude mcp add --transport http victoriametrics http://mcp-victoriametrics.victoria-metrics.svc.cluster.local:8080/mcp
          volumeMounts:
            - name: claude
              mountPath: /home/nonroot
      containers:
        - name: claude
          image: *image
          securityContext:
            procMount: Unmasked
            seccompProfile:
              type: Unconfined
            allowPrivilegeEscalation: true
            runAsUser: 568
            runAsGroup: 568
          resources:
            requests:
              cpu: 200m
              memory: 768Mi
            limits:
              memory: 2.5Gi
          envFrom:
            - secretRef:
                name: claude-env
          command: [ralph]
          volumeMounts:
            - name: claude
              mountPath: /home/nonroot
            - name: screenshots
              mountPath: /tmp/screenshots
            - name: ralph
              mountPath: /usr/local/bin/ralph
              subPath: ralph.pl
            - name: ralph
              mountPath: /etc/claude/prompt-common.md
              subPath: prompt-common.md
            - name: ralph
              mountPath: /etc/claude/prompt-dev.md
              subPath: prompt-dev.md
            - name: ralph
              mountPath: /etc/claude/prompt-lead.md
              subPath: prompt-lead.md
            - name: ralph
              mountPath: /etc/claude/prompt-reviewer.md
              subPath: prompt-reviewer.md
            - name: ralph
              mountPath: /etc/claude/prompt-dx.md
              subPath: prompt-dx.md
            - name: buildkit-certs
              mountPath: /etc/buildkit/certs
              readOnly: true
        - name: chromium
          image: ghcr.io/vaskozl/chromium:147.0.7727@sha256:b813584f3d929f720f7d8f29c669cf1c97f7f415f472e37f8da6378d05cc3a87
          args:
            - --headless
            - --remote-debugging-port=9222
            - --no-sandbox
          resources:
            requests:
              cpu: 100m
              memory: 500Mi
            limits:
              memory: 1500Mi
        - name: chrome-devtools-mcp
          image: cgr.dev/chainguard/node:latest@sha256:71ba727d0b819ff62db77380ecb255466e06ca40e97fe66c9b9d03c277099e65
          command: ["npx"]
          args:
            - -y
            - mcp-proxy@latest
            - --transport
            - streamablehttp
            - --port
            - "8080"
            - --
            - npx
            - -y
            - chrome-devtools-mcp@latest
            - --browserUrl=http://127.0.0.1:9222
          volumeMounts:
            - name: screenshots
              mountPath: /tmp/screenshots
      volumes:
        - name: buildkit-certs
          secret:
            secretName: buildkit-client-certs
        - name: screenshots
          emptyDir: {}
