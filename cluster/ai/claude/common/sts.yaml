# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master/statefulset-apps-v1.json
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: common
spec:
  serviceName: claude
  volumeClaimTemplates:
    - metadata:
        name: claude
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
  template:
    spec:
      serviceAccountName: claude
      hostUsers: false
      shareProcessNamespace: true
      securityContext:
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: claude
          image: ghcr.io/vaskozl/claude:latest@sha256:64a5bdedea5fca35f16f35657f23f39558655e6ad389920f2495c4be3954f2b3
          securityContext:
            procMount: Unmasked
            seccompProfile:
              type: Unconfined
            allowPrivilegeEscalation: true
            runAsUser: 568
            runAsGroup: 568
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              memory: 2.5Gi
          envFrom:
            - secretRef:
                name: claude-env
          volumeMounts:
            - name: claude
              mountPath: /home/nonroot
            - name: ralph
              mountPath: /usr/local/bin/ralph-dev
              subPath: ralph-dev.sh
            - name: ralph
              mountPath: /usr/local/bin/ralph-lead
              subPath: ralph-lead.sh
            - name: ralph
              mountPath: /etc/claude/prompt.md
              subPath: prompt.md
            - name: ralph
              mountPath: /usr/local/lib/ralph-common.sh
              subPath: ralph-common.sh
