# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master/statefulset-apps-v1.json
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: common
spec:
  serviceName: claude
  volumeClaimTemplates:
    - metadata:
        name: claude
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
  template:
    spec:
      serviceAccountName: claude
      hostUsers: false
      shareProcessNamespace: true
      securityContext:
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
      nodeSelector:
        kubernetes.io/arch: amd64
      initContainers:
        - name: mcp-setup
          image: &image ghcr.io/vaskozl/claude:latest@sha256:9c0ad067b4b179ba74101c567032ad541581ae41d921c8c4173d6eff2ff21536
          command: ["sh", "-c"]
          args:
            - |
              claude mcp remove chrome-devtools 2>/dev/null
              claude mcp add --transport http chrome-devtools http://127.0.0.1:8080/mcp
          volumeMounts:
            - name: claude
              mountPath: /home/nonroot
      containers:
        - name: claude
          image: *image
          securityContext:
            procMount: Unmasked
            seccompProfile:
              type: Unconfined
            allowPrivilegeEscalation: true
            runAsUser: 568
            runAsGroup: 568
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              memory: 2.5Gi
          envFrom:
            - secretRef:
                name: claude-env
          command: [ralph]
          volumeMounts:
            - name: claude
              mountPath: /home/nonroot
            - name: ralph
              mountPath: /usr/local/bin/ralph
              subPath: ralph.pl
            - name: ralph
              mountPath: /etc/claude/prompt-common.md
              subPath: prompt-common.md
            - name: ralph
              mountPath: /etc/claude/prompt-dev.md
              subPath: prompt-dev.md
            - name: ralph
              mountPath: /etc/claude/prompt-lead.md
              subPath: prompt-lead.md
            - name: ralph
              mountPath: /etc/claude/prompt-dx.md
              subPath: prompt-dx.md
            - name: buildkit-certs
              mountPath: /etc/buildkit/certs
              readOnly: true
        - name: chromium
          image: *image
          command: ["chromium"]
          args:
            - --headless
            - --remote-debugging-port=9222
            - --no-sandbox
          resources:
            requests:
              cpu: 100m
              memory: 500Mi
            limits:
              memory: 1500Mi
        - name: chrome-devtools-mcp
          image: cgr.dev/chainguard/node:latest@sha256:f05865c39e39728adbd1dd5b418e853694631e8818cf1468a5b6b73d65889b15
          command: ["npx"]
          args:
            - -y
            - mcp-proxy@latest
            - --transport
            - streamablehttp
            - --port
            - "8080"
            - --
            - npx
            - -y
            - chrome-devtools-mcp@latest
            - --browserUrl=http://127.0.0.1:9222
      volumes:
        - name: buildkit-certs
          secret:
            secretName: buildkit-client-certs
