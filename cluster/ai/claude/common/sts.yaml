# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master/statefulset-apps-v1.json
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: common
spec:
  serviceName: claude
  volumeClaimTemplates:
    - metadata:
        name: claude
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
  template:
    spec:
      serviceAccountName: claude
      hostUsers: false
      shareProcessNamespace: true
      securityContext:
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
      nodeSelector:
        kubernetes.io/arch: amd64
      initContainers:
        - name: mcp-setup
          image: &image ghcr.io/vaskozl/claude:2.1.142@sha256:2947ef2454ab0461c58325e1c9452c38614ae0ef7f69d14051ec162c76c02201
          command: ["sh", "-c"]
          args:
            - |
              claude mcp remove chrome-devtools 2>/dev/null
              claude mcp add --transport http chrome-devtools http://127.0.0.1:8080/mcp
              claude mcp remove victoriametrics 2>/dev/null
              claude mcp add --transport http victoriametrics http://mcp-victoriametrics.victoria-metrics.svc.cluster.local:8080/mcp
          volumeMounts:
            - name: claude
              mountPath: /home/nonroot
      containers:
        - name: claude
          image: *image
          securityContext:
            procMount: Unmasked
            seccompProfile:
              type: Unconfined
            allowPrivilegeEscalation: true
            runAsUser: 568
            runAsGroup: 568
          resources:
            requests:
              cpu: 200m
              memory: 768Mi
            limits:
              memory: 2.5Gi
          envFrom:
            - secretRef:
                name: claude-env
          env:
            # Suppress non-essential traffic — agents are headless and the
            # image SHA is pinned.
            - name: DISABLE_TELEMETRY
              value: "1"
            - name: DISABLE_BUG_COMMAND
              value: "1"
            - name: DISABLE_AUTOUPDATER
              value: "1"
            - name: DISABLE_ERROR_REPORTING
              value: "1"
          command: [ralph]
          volumeMounts:
            - name: claude
              mountPath: /home/nonroot
            - name: screenshots
              mountPath: /tmp/screenshots
            - name: turn-fifo
              mountPath: /run/claude
            - name: ralph
              mountPath: /usr/local/bin/ralph
              subPath: ralph.pl
            - name: ralph
              mountPath: /etc/claude/prompt-common.md
              subPath: prompt-common.md
            - name: ralph
              mountPath: /etc/claude/prompt-dev.md
              subPath: prompt-dev.md
            - name: ralph
              mountPath: /etc/claude/prompt-lead.md
              subPath: prompt-lead.md
            - name: ralph
              mountPath: /etc/claude/prompt-reviewer.md
              subPath: prompt-reviewer.md
            - name: ralph
              mountPath: /etc/claude/prompt-dx.md
              subPath: prompt-dx.md
            - name: ralph
              mountPath: /home/nonroot/.claude/settings.json
              subPath: claude-settings.json
            - name: buildkit-certs
              mountPath: /etc/buildkit/certs
              readOnly: true
        - name: chromium
          image: ghcr.io/vaskozl/chromium:148.0.7778@sha256:2d72bafd75871f8d4201f417a3a1811604ab54cfb42cb59ccb2409fc0fdecae2
          args:
            - --headless
            - --remote-debugging-port=9222
            - --no-sandbox
          resources:
            requests:
              cpu: 100m
              memory: 500Mi
            limits:
              memory: 1500Mi
        - name: chrome-devtools-mcp
          image: cgr.dev/chainguard/node:latest@sha256:b03abc833c40b5795c7740c83b44dbfe054db0da7bc93f924edcc64f2f26c05b
          command: ["npx"]
          args:
            - -y
            - mcp-proxy@latest
            - --transport
            - streamablehttp
            - --port
            - "8080"
            - --
            - npx
            - -y
            - chrome-devtools-mcp@latest
            - --browserUrl=http://127.0.0.1:9222
          resources:
            requests:
              cpu: 50m
              memory: 600Mi   # was 512Mi; covers observed 7d peak ~559MB with headroom
            limits:
              memory: 1Gi
          volumeMounts:
            - name: screenshots
              mountPath: /tmp/screenshots
      volumes:
        - name: buildkit-certs
          secret:
            secretName: buildkit-client-certs
        - name: screenshots
          emptyDir: {}
        - name: turn-fifo
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
