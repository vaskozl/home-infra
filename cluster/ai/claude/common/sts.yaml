# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master/statefulset-apps-v1.json
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: common
spec:
  serviceName: claude
  volumeClaimTemplates:
    - metadata:
        name: claude
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
  template:
    spec:
      serviceAccountName: claude
      hostUsers: false
      shareProcessNamespace: true
      securityContext:
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: claude
          image: ghcr.io/vaskozl/claude:latest@sha256:ecd321b90bcbaf467b7da542ffd0250718b8f1301d01a25d38f604506390f169
          securityContext:
            procMount: Unmasked
            seccompProfile:
              type: Unconfined
            allowPrivilegeEscalation: true
            runAsUser: 568
            runAsGroup: 568
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              memory: 2.5Gi
          envFrom:
            - secretRef:
                name: claude-env
          command: [ralph]
          volumeMounts:
            - name: claude
              mountPath: /home/nonroot
            - name: ralph
              mountPath: /usr/local/bin/ralph
              subPath: ralph.pl
            - name: ralph
              mountPath: /etc/claude/prompt-common.md
              subPath: prompt-common.md
            - name: ralph
              mountPath: /etc/claude/prompt-dev.md
              subPath: prompt-dev.md
            - name: ralph
              mountPath: /etc/claude/prompt-lead.md
              subPath: prompt-lead.md
            - name: ralph
              mountPath: /etc/claude/prompt-dx.md
              subPath: prompt-dx.md
            - name: buildkit-certs
              mountPath: /etc/buildkit/certs
              readOnly: true
      volumes:
        - name: buildkit-certs
          secret:
            secretName: buildkit-client-certs
