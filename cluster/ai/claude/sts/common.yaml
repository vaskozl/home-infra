# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master/statefulset-apps-v1.json
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: common
spec:
  serviceName: claude
  volumeClaimTemplates:
    - metadata:
        name: claude
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
  template:
    spec:
      serviceAccountName: claude
      hostUsers: false
      shareProcessNamespace: true
      securityContext:
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: claude
          image: ghcr.io/vaskozl/claude:latest@sha256:57b8bd7313fc8dc086907adf9b5f892e2b2462e19fdf88322a66fef53d33b8ec
          securityContext:
            procMount: Unmasked
            seccompProfile:
              type: Unconfined
            allowPrivilegeEscalation: true
            runAsUser: 568
            runAsGroup: 568
          resources:
            requests:
              cpu: 500m
              memory: 2500Mi
            limits:
              memory: 2500Mi
          envFrom:
            - secretRef:
                name: claude-env
          volumeMounts:
            - name: claude
              mountPath: /home/nonroot
