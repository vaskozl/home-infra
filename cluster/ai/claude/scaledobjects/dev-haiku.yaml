apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: claude-worker-haiku
spec:
  scaleTargetRef:
    kind: StatefulSet
    name: claude-worker-haiku
  minReplicaCount: 0
  maxReplicaCount: 1
  # Same schedule as other agents — scale to 0 during Anthropic peak hours.
  triggers:
    - type: cron
      metadata:
        timezone: UTC
        start: "0 19 * * 1-5"
        end: "0 13 * * 1-5"
        desiredReplicas: "1"
