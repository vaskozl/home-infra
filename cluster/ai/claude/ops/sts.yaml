# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master/statefulset-apps-v1.json
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: claude-ops
spec:
  template:
    spec:
      containers:
        - name: claude
          args: [ops]
          env:
            - name: ANTHROPIC_MODEL
              value: opus
            - name: ALERTMANAGER_URL
              value: https://am.sko.ai
      volumes:
        - name: ralph
          configMap:
            name: ralph
            defaultMode: 0555
