# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master/statefulset-apps-v1.json
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: common
spec:
  serviceName: claude
  volumeClaimTemplates:
    - metadata:
        name: claude
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 20Gi
  template:
    spec:
      serviceAccountName: claude
      hostUsers: false
      shareProcessNamespace: true
      securityContext:
        fsGroup: 568
        fsGroupChangePolicy: OnRootMismatch
      nodeSelector:
        kubernetes.io/arch: amd64
      initContainers:
        - name: mcp-setup
          image: &image ghcr.io/vaskozl/claude:2.1.207@sha256:5b4e56a7b9b96465e8290f7f4ac8f93a1dad51b1d87d273fc32061bc4d8c8c13
          command: ["sh", "-c"]
          args:
            - |
              claude mcp remove -s user victoriametrics 2>/dev/null
              claude mcp add -s user --transport http victoriametrics http://mcp-victoriametrics.victoria-metrics.svc.cluster.local:8080/mcp
          volumeMounts:
            - name: claude
              mountPath: /home/nonroot
      containers:
        - name: claude
          image: *image
          securityContext:
            procMount: Unmasked
            seccompProfile:
              type: Unconfined
            allowPrivilegeEscalation: true
            runAsUser: 568
            runAsGroup: 568
          resources:
            requests:
              cpu: 200m
              memory: 384Mi
            limits:
              memory: 2.5Gi
          envFrom:
            - secretRef:
                name: claude-env
          env:
            # Suppress non-essential traffic — agents are headless and the
            # image SHA is pinned.
            - name: DISABLE_TELEMETRY
              value: "1"
            - name: DISABLE_BUG_COMMAND
              value: "1"
            - name: DISABLE_AUTOUPDATER
              value: "1"
            - name: DISABLE_ERROR_REPORTING
              value: "1"
          command: [ralph]
          volumeMounts:
            - name: claude
              mountPath: /home/nonroot
            - name: screenshots
              mountPath: /tmp/screenshots
            - name: turn-fifo
              mountPath: /run/claude
            - name: ralph
              mountPath: /usr/local/bin/ralph
              subPath: ralph.pl
            - name: ralph
              mountPath: /etc/claude/prompt-common.md
              subPath: prompt-common.md
            - name: ralph
              mountPath: /etc/claude/prompt-dev.md
              subPath: prompt-dev.md
            - name: ralph
              mountPath: /etc/claude/prompt-lead.md
              subPath: prompt-lead.md
            - name: ralph
              mountPath: /etc/claude/prompt-reviewer.md
              subPath: prompt-reviewer.md
            - name: ralph
              mountPath: /etc/claude/prompt-dx.md
              subPath: prompt-dx.md
            - name: ralph
              mountPath: /etc/claude/prompt-ops.md
              subPath: prompt-ops.md
            - name: ralph
              mountPath: /home/nonroot/.claude/settings.json
              subPath: claude-settings.json
            - name: buildkit-certs
              mountPath: /etc/buildkit/certs
              readOnly: true
      volumes:
        - name: buildkit-certs
          secret:
            secretName: buildkit-client-certs
        - name: screenshots
          emptyDir: {}
        - name: turn-fifo
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
