# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master/statefulset-apps-v1.json
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: claude
spec:
  template:
    spec:
      initContainers:
        - name: mcp-setup-chrome
          image: ghcr.io/vaskozl/claude:2.1.144@sha256:8dff1c583a1b9c698280f92ee5a0da72ac02387d0f6fcbed0348999b8b8d6d33
          command: ["sh", "-c"]
          args:
            - |
              claude mcp remove chrome-devtools 2>/dev/null
              claude mcp add --transport http chrome-devtools http://127.0.0.1:8080/mcp
          volumeMounts:
            - name: claude
              mountPath: /home/nonroot
      containers:
        - name: chromium
          image: ghcr.io/vaskozl/chromium:148.0.7778@sha256:954783fe75798ab07bfdec4195bcea7f0a35726dbf6bb467191ffb124371eec4
          args:
            - --headless
            - --remote-debugging-port=9222
            - --no-sandbox
          resources:
            requests:
              cpu: 100m
              memory: 500Mi
            limits:
              memory: 1500Mi
        - name: chrome-devtools-mcp
          image: cgr.dev/chainguard/node:latest@sha256:ede3923b982dba34e7b7b15c37866492755118aa546a5ea244745a6e0c7d63a1
          command: ["npx"]
          args:
            - -y
            - mcp-proxy@latest
            - --transport
            - streamablehttp
            - --port
            - "8080"
            - --
            - npx
            - -y
            - chrome-devtools-mcp@latest
            - --browserUrl=http://127.0.0.1:9222
          resources:
            requests:
              cpu: 50m
              memory: 600Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: screenshots
              mountPath: /tmp/screenshots
