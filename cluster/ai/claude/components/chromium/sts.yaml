# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master/statefulset-apps-v1.json
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: claude
spec:
  template:
    spec:
      initContainers:
        - name: mcp-setup-chrome
          image: ghcr.io/vaskozl/claude:2.1.187@sha256:9e983baaad984fd91350da76ce5e1722779915548801c4e6c3917a1d7cb24616
          command: ["sh", "-c"]
          args:
            - |
              claude mcp remove -s user chrome-devtools 2>/dev/null
              claude mcp add -s user --transport http chrome-devtools http://127.0.0.1:8080/mcp
          volumeMounts:
            - name: claude
              mountPath: /home/nonroot
      containers:
        - name: chromium
          image: ghcr.io/vaskozl/chromium:149.0.7827@sha256:ad7e24a3f12e6f8fe62de1a4ede9f9b1d2996de412e2761831b66c6dec7601fc
          args:
            - --headless
            - --remote-debugging-port=9222
            - --no-sandbox
          resources:
            requests:
              cpu: 100m
              memory: 500Mi
            limits:
              memory: 1500Mi
        - name: chrome-devtools-mcp
          image: cgr.dev/chainguard/node:latest@sha256:7ce7491612c80eac34419a2d765ff73d4e1a5e791af0ef98c8d990b721340f46
          command: ["npx"]
          args:
            - -y
            - mcp-proxy@6.5.1
            - --transport
            - streamablehttp
            - --port
            - "8080"
            - --
            - npx
            - -y
            - chrome-devtools-mcp@1.1.1
            - --browserUrl=http://127.0.0.1:9222
          resources:
            requests:
              cpu: 50m
              memory: 600Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: screenshots
              mountPath: /tmp/screenshots
