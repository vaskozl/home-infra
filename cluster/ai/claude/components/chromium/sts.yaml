# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master/statefulset-apps-v1.json
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: claude
spec:
  template:
    spec:
      initContainers:
        - name: mcp-setup-chrome
          image: ghcr.io/vaskozl/claude:2.1.170@sha256:a0c00b293b6b6480dd067605bbc681544927a9f436b84603bd689f1f5e29bd19
          command: ["sh", "-c"]
          args:
            - |
              claude mcp remove chrome-devtools 2>/dev/null
              claude mcp add --transport http chrome-devtools http://127.0.0.1:8080/mcp
          volumeMounts:
            - name: claude
              mountPath: /home/nonroot
      containers:
        - name: chromium
          image: ghcr.io/vaskozl/chromium:149.0.7827@sha256:bdbabcc7731fdda6ad8368f43f30d0668c0bd06ddde47c3b8563a1d033f71266
          args:
            - --headless
            - --remote-debugging-port=9222
            - --no-sandbox
          resources:
            requests:
              cpu: 100m
              memory: 500Mi
            limits:
              memory: 1500Mi
        - name: chrome-devtools-mcp
          image: cgr.dev/chainguard/node:latest@sha256:857cb86c746a3d202fdc0cbebb67fb22b3bf51890c0f3ee6af6b40be2059c725
          command: ["npx"]
          args:
            - -y
            - mcp-proxy@6.5.1
            - --transport
            - streamablehttp
            - --port
            - "8080"
            - --
            - npx
            - -y
            - chrome-devtools-mcp@1.1.1
            - --browserUrl=http://127.0.0.1:9222
          resources:
            requests:
              cpu: 50m
              memory: 600Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: screenshots
              mountPath: /tmp/screenshots
