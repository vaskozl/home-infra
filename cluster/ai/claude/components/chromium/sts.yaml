# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master/statefulset-apps-v1.json
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: claude
spec:
  template:
    spec:
      initContainers:
        - name: mcp-setup-chrome
          image: ghcr.io/vaskozl/claude:2.1.154@sha256:030e25e0b99a77deb5f8399d13cfb2d9c988592e69d7d1223f91abd2cddb2fad
          command: ["sh", "-c"]
          args:
            - |
              claude mcp remove chrome-devtools 2>/dev/null
              claude mcp add --transport http chrome-devtools http://127.0.0.1:8080/mcp
          volumeMounts:
            - name: claude
              mountPath: /home/nonroot
      containers:
        - name: chromium
          image: ghcr.io/vaskozl/chromium:148.0.7778@sha256:ba600b58ef246676c9e89fff4cfe0b6607d9597815df52a8e6dca3f312573705
          args:
            - --headless
            - --remote-debugging-port=9222
            - --no-sandbox
          resources:
            requests:
              cpu: 100m
              memory: 500Mi
            limits:
              memory: 1500Mi
        - name: chrome-devtools-mcp
          image: cgr.dev/chainguard/node:latest@sha256:045335a479d6c59bab89e3caaaf9ed2aed5528d92e2431a3e2afcbf258dba9a6
          command: ["npx"]
          args:
            - -y
            - mcp-proxy@latest
            - --transport
            - streamablehttp
            - --port
            - "8080"
            - --
            - npx
            - -y
            - chrome-devtools-mcp@latest
            - --browserUrl=http://127.0.0.1:9222
          resources:
            requests:
              cpu: 50m
              memory: 600Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: screenshots
              mountPath: /tmp/screenshots
