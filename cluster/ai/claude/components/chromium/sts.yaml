# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master/statefulset-apps-v1.json
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: claude
spec:
  template:
    spec:
      initContainers:
        - name: mcp-setup-chrome
          image: ghcr.io/vaskozl/claude:2.1.196@sha256:75f380cd5b7226eab1eae595b55a8b0315732d5bb05e4069822b1697eb15844d
          command: ["sh", "-c"]
          args:
            - |
              claude mcp remove -s user chrome-devtools 2>/dev/null
              claude mcp add -s user --transport http chrome-devtools http://127.0.0.1:8080/mcp
          volumeMounts:
            - name: claude
              mountPath: /home/nonroot
      containers:
        - name: chromium
          image: ghcr.io/vaskozl/chromium:149.0.7827@sha256:c59cfe221db612646782d9dc8460c93980f96759dc484ce20aa224d5cdd80831
          args:
            - --headless
            - --remote-debugging-port=9222
            - --no-sandbox
          resources:
            requests:
              cpu: 100m
              memory: 500Mi
            limits:
              memory: 1500Mi
        - name: chrome-devtools-mcp
          image: cgr.dev/chainguard/node:latest@sha256:955b52dd59f8a73419fe1931e13a9b9eb822e7e5fda21ca754688b55753ea6ca
          command: ["npx"]
          args:
            - -y
            - mcp-proxy@6.5.1
            - --transport
            - streamablehttp
            - --port
            - "8080"
            - --
            - npx
            - -y
            - chrome-devtools-mcp@1.1.1
            - --browserUrl=http://127.0.0.1:9222
          resources:
            requests:
              cpu: 50m
              memory: 600Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: screenshots
              mountPath: /tmp/screenshots
