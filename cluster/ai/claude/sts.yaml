apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: claude
spec:
  serviceName: claude
  template:
    spec:
      securityContext:
        fsGroup: 568
        runAsGroup: 568
        runAsNonRoot: true
        runAsUser: 568
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        kubernetes.io/arch: amd64
      shareProcessNamespaces: true
      containers:
        - name: claude
          image: &image ghcr.io/vaskozl/claude:2.1.76@sha256:e3cab772b82a47e0dc2de79d3a17eb926d584417b631a403a8e92c19a7ad5c8c
          command: ["sleep", "inf"]
          resources:
            requests:
              cpu: 500m
              memory: 2500Mi
            limits:
              memory: 2500Mi
          envFrom:
            - secretRef:
                name: claude-env
          volumeMounts:
            - name: claude
              mountPath: /home/nonroot
        - name: chromium
          image: *image
          command: ["xvfb-run", "chromium"]
          args:
            - --remote-debugging-port=9222
            - --no-sandbox
          resources:
            requests:
              cpu: 100m
              memory: 500Mi
            limits:
              memory: 1500Mi
      volumes:
        - name: claude
          persistentVolumeClaim:
            claimName: claude-pvc
