apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: claude
spec:
  serviceName: claude
  template:
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: claude
          image: ghcr.io/vaskozl/claude:2.1.76
          command: ["sleep", "inf"]
          resources:
            requests:
              cpu: 100m
              memory: 200Mi
            limits:
              memory: 200Mi
          envFrom:
            - secretRef:
                name: claude-env
          volumeMounts:
            - name: claudemd
              mountPath: /home/nonroot/.claude/CLAUDE.md
              subPath: CLAUDE.md
            - name: claude
              mountPath: /home/nonroot/.claude
      volumes:
        - name: claudemd
          configMap:
            name: claude-md
        - name: claude
          persistentVolumeClaim:
            claimName: claude-pvc
