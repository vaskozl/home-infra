apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: claude
spec:
  serviceName: claude
  template:
    spec:
      securityContext:
        fsGroup: 568
        runAsGroup: 568
        runAsNonRoot: true
        runAsUser: 568
        seccompProfile:
          type: Unconfined
        capabilities:
          add:
            - SYS_ADMIN
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: claude
          image: ghcr.io/vaskozl/claude:2.1.76@sha256:e3cab772b82a47e0dc2de79d3a17eb926d584417b631a403a8e92c19a7ad5c8c
          command: ["sleep", "inf"]
          env:
            - name: AGENT_BROWSER_HEADED
              value: "true"
            - name: AGENT_BROWSER_EXECUTABLE_PATH
              value: /home/nonroot/bin/x-chromium
          resources:
            requests:
              cpu: 500m
              memory: 2500Mi
            limits:
              memory: 2500Mi
          envFrom:
            - secretRef:
                name: claude-env
          volumeMounts:
            - name: claude
              mountPath: /home/nonroot
      volumes:
        - name: claude
          persistentVolumeClaim:
            claimName: claude-pvc
