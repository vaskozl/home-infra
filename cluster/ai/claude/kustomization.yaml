# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ai
resources:
  - rbac.yaml
  - sts/lead.yaml
  - sts/dev-sonnet.yaml
  - sts/dev-opus.yaml
  - scaledobjects/lead.yaml
  - scaledobjects/dev-sonnet.yaml
  - scaledobjects/dev-opus.yaml
patches:
  - path: sts/common.yaml
    target:
      kind: StatefulSet
labels:
  - pairs:
      app.kubernetes.io/name: claude
    includeSelectors: true
secretGenerator:
  - name: claude-env
    envs:
      - claude.enc.env
configMapGenerator:
  - name: ralph-prompt
    files:
      - prompt-dev.md=prompts/prompt-dev.md
      - ralph.sh=prompts/ralph.sh
  - name: planner-prompt
    files:
      - prompt-lead.md=prompts/prompt-lead.md
      - planner.sh=prompts/planner.sh
