# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ai
resources:
  - rbac.yaml
  - ../../gitlab/buildkit/buildkit-client-certs.yaml
  - lead
  - dev-sonnet
  - dev-opus
  - dx
patches:
  - path: common/sts.yaml
    target:
      kind: StatefulSet
labels:
  - pairs:
      app.kubernetes.io/name: claude
    includeSelectors: true
secretGenerator:
  - name: claude-env
    envs:
      - claude.enc.env
configMapGenerator:
  - name: ralph-dev
    options:
      annotations:
        kustomize.toolkit.fluxcd.io/substitute: disabled
    files:
      - prompt.md=prompts/prompt-dev.md
      - ralph-dev.sh=prompts/ralph-dev.sh
      - ralph-common.sh=prompts/ralph-common.sh
  - name: ralph-lead
    options:
      annotations:
        kustomize.toolkit.fluxcd.io/substitute: disabled
    files:
      - prompt.md=prompts/prompt-lead.md
      - ralph-lead.sh=prompts/ralph-lead.sh
      - ralph-common.sh=prompts/ralph-common.sh
  - name: ralph-dx
    options:
      annotations:
        kustomize.toolkit.fluxcd.io/substitute: disabled
    files:
      - prompt.md=prompts/prompt-dx.md
      - ralph-dx.sh=prompts/ralph-dx.sh
      - ralph-common.sh=prompts/ralph-common.sh
