apiVersion: batch/v1
kind: CronJob
metadata:
  name: common
spec:
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          securityContext:
            fsGroup: 568
            runAsGroup: 568
            runAsNonRoot: true
            runAsUser: 568
            seccompProfile:
              type: RuntimeDefault
          restartPolicy: Never
          nodeSelector:
            kubernetes.io/arch: amd64
          containers:
            - name: claude
              image: ghcr.io/vaskozl/claude:2.1.76
              resources:
                requests:
                  cpu: 500m
                  memory: 2500Mi
                limits:
                  memory: 2500Mi
              envFrom:
                - secretRef:
                    name: claude-env
              volumeMounts:
                - name: claude
                  mountPath: /home/nonroot
          volumes:
            - name: claude
              persistentVolumeClaim:
                claimName: claude-pvc
