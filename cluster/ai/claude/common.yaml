apiVersion: batch/v1
kind: CronJob
metadata:
  name: common
spec:
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          nodeSelector:
            kubernetes.io/arch: amd64
          containers:
            - name: claude
              image: ghcr.io/vaskozl/claude:2.1.76
              resources:
                requests:
                  cpu: 100m
                  memory: 200Mi
                limits:
                  memory: 200Mi
              envFrom:
                - secretRef:
                    name: claude-env
              volumeMounts:
                - name: claudemd
                  mountPath: /home/nonroot/.claude/CLAUDE.md
                  subPath: CLAUDE.md
                - name: claude
                  mountPath: /home/nonroot/.claude
          volumes:
            - name: claudemd
              configMap:
                name: claude-md
            - name: claude
              persistentVolumeClaim:
                claimName: claude-pvc
