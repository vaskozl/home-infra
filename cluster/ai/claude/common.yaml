apiVersion: batch/v1
kind: CronJob
metadata:
  name: common
spec:
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          shareProcessNamespace: true
          securityContext:
            fsGroup: 568
            runAsGroup: 568
            runAsNonRoot: true
            runAsUser: 568
            seccompProfile:
              type: RuntimeDefault
          restartPolicy: Never
          nodeSelector:
            kubernetes.io/arch: amd64
          containers:
            - name: claude
              image: &image ghcr.io/vaskozl/claude:2.1.76@sha256:24ccb70dd77df7532da4b6209dc583819a77d816a84b00358463ccb184be5d4d
              resources:
                requests:
                  cpu: 500m
                  memory: 2500Mi
                limits:
                  memory: 2500Mi
              envFrom:
                - secretRef:
                    name: claude-env
              volumeMounts:
                - name: claude
                  mountPath: /home/nonroot
            - name: chromium
              image: *image
              command: ["xvfb-run", "-e", "/dev/stdout", "chromium"]
              args:
                - --remote-debugging-port=9222
                - --no-sandbox
              resources:
                requests:
                  cpu: 100m
                  memory: 500Mi
                limits:
                  memory: 1500Mi
          volumes:
            - name: claude
              persistentVolumeClaim:
                claimName: claude-pvc
