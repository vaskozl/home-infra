# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master/cronjob-batch-v1.json
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ci-monitor
spec:
  schedule: '17 * * * *'
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 3
  successfulJobsHistoryLimit: 1
  jobTemplate:
    metadata:
    spec:
      template:
        metadata:
        spec:
          containers:
            - args: [/script/ci-monitor.pl]
              image: ghcr.io/vaskozl/perl-mojolicious:9.46@sha256:e731ba7ecc47574a5b160b14220a1579123021d82d93642c39ce4335a317aa69
              name: ci-monitor
              envFrom:
                - secretRef:
                    name: claude-env
              resources:
                requests:
                  cpu: 20m
                  memory: 64Mi
                limits:
                  memory: 128Mi
              volumeMounts:
                - mountPath: /script
                  name: script
          restartPolicy: Never
          volumes:
            - configMap:
                defaultMode: 420
                name: ci-monitor-script
              name: script
