# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master/statefulset-apps-v1.json
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qwen
spec:
  serviceName: qwen
  hostUsers: false
  template:
    spec:
      shareProcessNamespace: true
      securityContext:
        seccompProfile:
          type: Unconfined
        sysctls:
          - name: user.max_user_namespaces
            value: "63359"
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: qwen
          image: &image ghcr.io/vaskozl/qwen-code:0.13.0
          command: [ralph]
          securityContext:
            capabilities:
              add: ["SYS_ADMIN"]
            allowPrivilegeEscalation: true
          resources:
            requests:
              cpu: 500m
              memory: 2500Mi
            limits:
              memory: 2500Mi
          envFrom:
            - secretRef:
                name: qwen-env
          volumeMounts:
            - name: qwen
              mountPath: /home/nonroot
            - name: ralph
              mountPath: /usr/local/bin/ralph
              subPath: ralph.sh
            - name: ralph
              mountPath: /etc/qwen/prompt.md
              subPath: prompt.md
            - name: settings
              mountPath: /home/nonroot/.qwen/settings.json
              subPath: settings.json
      volumes:
        - name: qwen
          persistentVolumeClaim:
            claimName: qwen-pvc
        - name: ralph
          configMap:
            name: ralph-prompt
            defaultMode: 0555
        - name: settings
          configMap:
            name: qwen-settings
