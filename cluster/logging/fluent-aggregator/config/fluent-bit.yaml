service:
  http_server: 'on'
  http_listen: 0.0.0.0
  http_port: 2020
  storage.path: /var/log/k8s/.flb-storage
  storage.metrics: 'on'
pipeline:
  inputs:
    - name: forward
      mem_buf_limit: 2M
      storage.type: filesystem
  outputs:
    - name: file
      match: '*'
      path: '/var/log/k8s'
      format: template
      template: '{msg} pod={pod} ctr={ctr} ts={ts}'
      mkdir: true
