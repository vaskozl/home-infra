# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master/cronjob-batch-v1.json
apiVersion: batch/v1
kind: CronJob
metadata:
  name: logrotate
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
spec:
  successfulJobsHistoryLimit: 3
  suspend: false
  concurrencyPolicy: Forbid
  failedJobsHistoryLimit: 1
  schedule: '1 0 * * *'
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: logrotate
              image: &image ghcr.io/vaskozl/logrotate:3.22.0@sha256:d8b900b6841bb0969477b03ad8c80246c4e04730f30ca71c9803478a4468f189
              args: ['-v', '/config/logrotate.conf', '-s', '/var/log/k8s/logrotate.status']
              resources:
                requests:
                  cpu: 10m
                  memory: 10Mi
                limits:
                  memory: 100Mi
              securityContext: &security
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                runAsUser: 0
                runAsGroup: 0
                seccompProfile:
                  type: RuntimeDefault
              volumeMounts: &mounts
                - name: logging-pvc
                  mountPath: /var/log/k8s
                - name: config
                  mountPath: /config
          initContainers:
            - image: *image
              name: fix-permissions
              command: [sh, -c, 'chmod 700 /var/log/k8s/*']
              resources:
                limits:
                  memory: 5Mi
                requests:
                  cpu: 10m
                  memory: 5Mi
              securityContext: *security
              volumeMounts: *mounts
          restartPolicy: Never
          volumes:
            - name: logging-pvc
              persistentVolumeClaim:
                claimName: logging-pvc
            - name: config
              configMap:
                name: logrotate-config
