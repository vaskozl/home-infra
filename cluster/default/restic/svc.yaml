# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/master/service-v1.json

apiVersion: v1
kind: Service
metadata:
  name: restic
spec:
  ports:
    - port: 8000
  clusterIP: None
  type: ClusterIP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: restic
subsets:
  - addresses:
      - ip: 192.168.1.108
    ports:
      - port: 8000
